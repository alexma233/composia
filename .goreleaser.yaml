version: 2

project_name: composia

force_token: gitea

gitea_urls:
  api: https://forgejo.alexma.top/api/v1
  download: https://forgejo.alexma.top

builds:
  - id: composia-linux
    main: ./cmd/composia
    binary: composia
    skip: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "cli") }}'
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch: &common_linux_goarch
      - amd64
      - arm64
      - "386"
      - arm
      - riscv64
    goarm:
      - "7"
    ignore: &common_linux_ignore
      - goarch: amd64
        goarm: "7"
      - goarch: arm64
        goarm: "7"
      - goarch: "386"
        goarm: "7"
      - goarch: riscv64
        goarm: "7"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X forgejo.alexma.top/alexma233/composia/internal/version.Value={{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .FullCommit }}{{ else }}{{ .Version }}{{ end }}

  - id: composia-darwin
    main: ./cmd/composia
    binary: composia
    skip: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "cli") }}'
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X forgejo.alexma.top/alexma233/composia/internal/version.Value={{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .FullCommit }}{{ else }}{{ .Version }}{{ end }}

  - id: composia-windows
    main: ./cmd/composia
    binary: composia
    skip: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "cli") }}'
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - "386"
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X forgejo.alexma.top/alexma233/composia/internal/version.Value={{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .FullCommit }}{{ else }}{{ .Version }}{{ end }}

  - id: composia-controller-linux
    main: ./cmd/composia-controller
    binary: composia-controller
    skip: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "controller") }}'
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch: *common_linux_goarch
    goarm:
      - "7"
    ignore: *common_linux_ignore
    flags:
      - -trimpath
    ldflags:
      - -s -w -X forgejo.alexma.top/alexma233/composia/internal/version.Value={{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .FullCommit }}{{ else }}{{ .Version }}{{ end }}

  - id: composia-agent-linux
    main: ./cmd/composia-agent
    binary: composia-agent
    skip: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "agent") }}'
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch: *common_linux_goarch
    goarm:
      - "7"
    ignore: *common_linux_ignore
    flags:
      - -trimpath
    ldflags:
      - -s -w -X forgejo.alexma.top/alexma233/composia/internal/version.Value={{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .FullCommit }}{{ else }}{{ .Version }}{{ end }}

archives:
  - id: linux-binaries
    ids:
      - composia-linux
      - composia-controller-linux
      - composia-agent-linux
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md

  - id: darwin-cli
    ids:
      - composia-darwin
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

  - id: windows-cli
    ids:
      - composia-windows
    formats:
      - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}"
  format: tar.gz
  prefix_template: "{{ .ProjectName }}-{{ .Version }}/"

snapshot:
  version_template: "{{ incpatch .Version }}.next"

dockers_v2:
  - id: composia-cli
    ids:
      - composia-linux
    dockerfile: Dockerfile.goreleaser
    images:
      - forgejo.alexma.top/alexma233/composia-cli
      - ghcr.io/alexma233/composia-cli
      - '{{ if not .Env.COMPOSIA_CANARY_TARGET }}alexma233/composia-cli{{ end }}'
    tags: &docker_release_tags
      - '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }}'
      - '{{ if not .Env.COMPOSIA_CANARY_TARGET }}{{ .Major }}.{{ .Minor }}{{ end }}'
      - '{{ if not .Env.COMPOSIA_CANARY_TARGET }}{{ .Major }}{{ end }}'
      - '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ else }}latest{{ end }}'
    labels:
      org.opencontainers.image.description: Composia CLI image
      org.opencontainers.image.documentation: https://docs.composia.xyz
      org.opencontainers.image.vendor: alexma233
      org.opencontainers.image.ref.name: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ else }}{{ .Tag }}{{ end }}'
      org.opencontainers.image.version: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }}'
      io.composia.channel: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ end }}'
      io.composia.image: cli
    platforms: &docker_release_platforms
      - linux/amd64
      - linux/arm64
      - linux/386
      - linux/arm/v7
      - linux/riscv64
    flags:
      - --target=cli
    disable: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "cli") }}'

  - id: composia-controller
    ids:
      - composia-controller-linux
    dockerfile: Dockerfile.goreleaser
    images:
      - forgejo.alexma.top/alexma233/composia-controller
      - ghcr.io/alexma233/composia-controller
      - '{{ if not .Env.COMPOSIA_CANARY_TARGET }}alexma233/composia-controller{{ end }}'
    tags: *docker_release_tags
    labels:
      org.opencontainers.image.description: Composia controller runtime image
      org.opencontainers.image.documentation: https://docs.composia.xyz
      org.opencontainers.image.vendor: alexma233
      org.opencontainers.image.ref.name: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ else }}{{ .Tag }}{{ end }}'
      org.opencontainers.image.version: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }}'
      io.composia.channel: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ end }}'
      io.composia.image: controller
    platforms: *docker_release_platforms
    flags:
      - --target=controller
    disable: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "controller") }}'

  - id: composia-agent
    ids:
      - composia-agent-linux
    dockerfile: Dockerfile.goreleaser
    images:
      - forgejo.alexma.top/alexma233/composia-agent
      - ghcr.io/alexma233/composia-agent
      - '{{ if not .Env.COMPOSIA_CANARY_TARGET }}alexma233/composia-agent{{ end }}'
    tags: *docker_release_tags
    labels:
      org.opencontainers.image.description: Composia agent runtime image
      org.opencontainers.image.documentation: https://docs.composia.xyz
      org.opencontainers.image.vendor: alexma233
      org.opencontainers.image.ref.name: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ else }}{{ .Tag }}{{ end }}'
      org.opencontainers.image.version: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary-{{ .ShortCommit }}{{ else }}{{ .Version }}{{ end }}'
      io.composia.channel: '{{ if .Env.COMPOSIA_CANARY_TARGET }}canary{{ end }}'
      io.composia.image: agent
    platforms: *docker_release_platforms
    flags:
      - --target=agent
    disable: '{{ and (ne .Env.COMPOSIA_CANARY_TARGET "") (ne .Env.COMPOSIA_CANARY_TARGET "agent") }}'

changelog:
  use: gitea
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

nfpms:
  - id: linux-packages
    ids:
      - composia-linux
      - composia-controller-linux
      - composia-agent-linux
    package_name: composia
    file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}
    vendor: AlexMa
    homepage: https://docs.composia.xyz
    maintainer: AlexMa <i@fur.im>
    description: Self-hosted Docker Compose control plane and CLI.
    license: AGPL-3.0-only
    section: utils
    priority: optional
    bindir: /usr/bin
    formats:
      - archlinux
      - deb
      - rpm
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/composia/LICENSE
        file_info:
          mode: 0644
      - src: README.md
        dst: /usr/share/doc/composia/README.md
        file_info:
          mode: 0644

aurs:
  - name: composia-bin
    ids:
      - linux-binaries
    homepage: https://docs.composia.xyz
    description: Self-hosted Docker Compose control plane and CLI.
    maintainers:
      - "AlexMa <i at fur dot im>"
    license: AGPL-3.0-only
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/composia-bin.git"
    url_template: "https://forgejo.alexma.top/alexma233/composia/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: auto
    provides:
      - composia
    conflicts:
      - composia
    package: |-
      install -Dm755 "./composia" "${pkgdir}/usr/bin/composia"
      install -Dm755 "./composia-controller" "${pkgdir}/usr/bin/composia-controller"
      install -Dm755 "./composia-agent" "${pkgdir}/usr/bin/composia-agent"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/composia-bin/LICENSE"
      install -Dm644 "./README.md" "${pkgdir}/usr/share/doc/composia-bin/README.md"
    commit_msg_template: "Update to {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: i@fur.im

aur_sources:
  - name: composia
    homepage: https://docs.composia.xyz
    description: Self-hosted Docker Compose control plane and CLI.
    maintainers:
      - "AlexMa <i at fur dot im>"
    license: AGPL-3.0-only
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/composia.git"
    url_template: "https://forgejo.alexma.top/alexma233/composia/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    skip_upload: auto
    arches:
      - x86_64
      - aarch64
      - armv7h
      - riscv64
    provides:
      - composia
    conflicts:
      - composia-bin
    makedepends:
      - go
      - git
    build: |-
      cd "${pkgname}-${pkgver}"
      export CGO_ENABLED=0
      export GOPATH="${srcdir}/go"
      local ldflags="-s -w -X forgejo.alexma.top/alexma233/composia/internal/version.Value=v${pkgver}"
      go build -trimpath -ldflags "${ldflags}" -o composia ./cmd/composia
      go build -trimpath -ldflags "${ldflags}" -o composia-controller ./cmd/composia-controller
      go build -trimpath -ldflags "${ldflags}" -o composia-agent ./cmd/composia-agent
    package: |-
      cd "${pkgname}-${pkgver}"
      install -Dm755 composia "${pkgdir}/usr/bin/composia"
      install -Dm755 composia-controller "${pkgdir}/usr/bin/composia-controller"
      install -Dm755 composia-agent "${pkgdir}/usr/bin/composia-agent"
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/composia/LICENSE"
      install -Dm644 README.md "${pkgdir}/usr/share/doc/composia/README.md"
    commit_msg_template: "Update to {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: i@fur.im

release:
  disable: '{{ ne .Env.COMPOSIA_CANARY_TARGET "" }}'

  gitea:
    owner: alexma233
    name: composia

  prerelease: true
  mode: replace

  header: |
    {{- if .TagBody }}
    {{ .TagBody }}
    {{- end }}

    ## Downloads

    | Architecture | Windows | macOS | Debian | Fedora | Arch | Linux Archive | Checksum |
    |---|---|---|---|---|---|---|---|
    | x86-64 (64-bit) | [ZIP]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_windows_amd64.zip) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_darwin_amd64.tar.gz) | [deb]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_amd64.deb) | [rpm]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_amd64.rpm) | [pkg.tar.zst]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_amd64.pkg.tar.zst) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_linux_amd64.tar.gz) | [checksums.txt]({{ .ReleaseURL }}/checksums.txt) |
    | AArch64 (ARM64) | [ZIP]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_windows_arm64.zip) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_darwin_arm64.tar.gz) | [deb]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_arm64.deb) | [rpm]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_arm64.rpm) | [pkg.tar.zst]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_arm64.pkg.tar.zst) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_linux_arm64.tar.gz) | [checksums.txt]({{ .ReleaseURL }}/checksums.txt) |
    | ARMv7 (32-bit) |  |  | [deb]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_armv7.deb) | [rpm]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_armv7.rpm) | [pkg.tar.zst]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_armv7.pkg.tar.zst) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_linux_armv7.tar.gz) | [checksums.txt]({{ .ReleaseURL }}/checksums.txt) |
    | x86-32 (32-bit) | [ZIP]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_windows_386.zip) |  | [deb]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_386.deb) | [rpm]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_386.rpm) | [pkg.tar.zst]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_386.pkg.tar.zst) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_linux_386.tar.gz) | [checksums.txt]({{ .ReleaseURL }}/checksums.txt) |
    | RISC-V 64-bit |  |  | [deb]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_riscv64.deb) | [rpm]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_riscv64.rpm) | [pkg.tar.zst]({{ .ReleaseURL }}/composia_{{ .Version }}_linux_riscv64.pkg.tar.zst) | [tar.gz]({{ .ReleaseURL }}/{{ .ProjectName }}_{{ .Version }}_linux_riscv64.tar.gz) | [checksums.txt]({{ .ReleaseURL }}/checksums.txt) |

    ## Included binaries

    Linux archives and Linux packages include: `composia` (CLI), `composia-controller` and `composia-agent`
    Windows and macOS archives include: `composia` (CLI)
