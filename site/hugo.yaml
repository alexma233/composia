baseURL: https://composia.xyz/
title: Composia
enableGitInfo: true

languages:
  en:
    label: English
    locale: en
    weight: 1
  de:
    label: Deutsch
    locale: de
    weight: 2
  fr:
    label: Français
    locale: fr
    weight: 3
  ja:
    label: 日本語
    locale: ja
    weight: 4
  zh-hans:
    label: 简体中文
    locale: zh-cn
    weight: 5
  zh-hant:
    label: 繁體中文
    locale: zh-tw
    weight: 6

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  imports:
    - path: github.com/imfing/hextra

params:
  externalLinkDecoration: true
  displayUpdatedDate: true
  dateFormat: "Jan 2, 2006"
  displayUpdatedAuthor: true
  navbar:
    displayLogo: true
    displayTitle: true
    logo:
      path: favicon.svg
      link: /
      width: 32
      height: 32
  imageZoom:
    enable: true
  analytics:
    umami:
      serverURL: "https://umi.alexma.top"
      websiteID: "94db1cb1-74f4-4a40-ad6c-962362670409"
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
  editURL:
    enable: true
    base: "https://forgejo.alexma.top/alexma233/composia/_edit/main"

outputs:
  home: [html, llms]
