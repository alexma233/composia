version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dogsled
    - durationcheck
    - dupword
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - gosec
    - iface
    - intrange
    - makezero
    - mirror
    - misspell
    - musttag
    - nilerr
    - nilnil
    - noctx
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - recvcheck
    - sloglint
    - sqlclosecheck
    - unconvert
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    gosec:
      excludes:
        - G104
        - G404
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-checks:
        - argOrder
        - badCall
        - badCond
        - codegenComment
        - commentedOutCode
        - defaultCaseOrder
        - dupArg
        - dupBranchBody
        - dupCase
        - emptyStringTest
        - exitAfterDefer
        - flagDeref
        - flagName
        - ifElseChain
        - mapKey
        - newDeref
        - offBy1
        - regexpMust
        - sloppyLen
        - sloppyReassign
        - stringXbytes
        - switchTrue
        - typeSwitchVar
        - underef
        - unlambda
        - unslice
        - valSwap
        - wrapperFunc
        - yodaStyleExpr
    sloglint:
      no-global: "all"
    goconst:
      min-len: 3
      min-occurrences: 5
    recvcheck:
      enabled: true

formatters:
  enable:
    - gofumpt
    - goimports
