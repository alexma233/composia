services:
  init-repo-controller:
    image: alpine/git:2.49.1
    working_dir: /data/repo-controller
    entrypoint:
      - sh
      - -ec
      - if [ ! -d .git ]; then git init; fi
    volumes:
      - controller_repo:/data/repo-controller

  init-perms-controller:
    image: alpine:3.22
    entrypoint:
      - sh
      - -ec
      - |
        mkdir -p /data/repo-controller /data/state-controller /data/logs/tasks
        chown -R 65532:65532 /data/repo-controller /data/state-controller /data/logs
    volumes:
      - controller_repo:/data/repo-controller
      - controller_state:/data/state-controller
      - controller_logs:/data/logs

  init-config-perms:
    image: alpine:3.22
    entrypoint:
      - sh
      - -ec
      - |
        if [ -f /app/configs/age-identity.key ]; then
          chown 65532:65532 /app/configs/age-identity.key
          chmod 600 /app/configs/age-identity.key
        fi
        if [ -f /app/configs/age-recipients.txt ]; then
          chown 65532:65532 /app/configs/age-recipients.txt
          chmod 644 /app/configs/age-recipients.txt
        fi
    volumes:
      - ./config:/app/configs

  controller:
    image: forgejo.alexma.top/alexma233/composia:latest
    depends_on:
      init-repo-controller:
        condition: service_completed_successfully
      init-perms-controller:
        condition: service_completed_successfully
      init-config-perms:
        condition: service_completed_successfully
    command: ["controller", "-config", "/app/configs/config.yaml"]
    ports:
      - "7001:7001"
    volumes:
      - ./config:/app/configs:ro
      - controller_repo:/data/repo-controller
      - controller_state:/data/state-controller
      - controller_logs:/data/logs
    networks:
      - composia
    restart: unless-stopped

  init-perms-agent:
    image: alpine:3.22
    entrypoint:
      - sh
      - -ec
      - |
        mkdir -p /data/repo-agent/caddy/generated /data/state-agent
        chown -R 65532:65532 /data/repo-agent /data/state-agent
    volumes:
      - agent_repo:/data/repo-agent
      - agent_state:/data/state-agent

  agent:
    image: forgejo.alexma.top/alexma233/composia:latest
    depends_on:
      controller:
        condition: service_started
      init-perms-agent:
        condition: service_completed_successfully
      init-config-perms:
        condition: service_completed_successfully
    command: ["agent", "-config", "/app/configs/config.yaml"]
    group_add:
      - "${DOCKER_SOCK_GID}"
    volumes:
      - ./config:/app/configs:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_repo:/data/repo-agent
      - agent_state:/data/state-agent
    networks:
      - composia
    restart: unless-stopped

  web:
    image: forgejo.alexma.top/alexma233/composia-web:latest
    depends_on:
      controller:
        condition: service_started
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    networks:
      - composia
    restart: unless-stopped

networks:
  composia:
    name: composia

volumes:
  controller_repo:
  controller_state:
  controller_logs:
  agent_repo:
  agent_state:
