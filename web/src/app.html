<!doctype html>
<html lang="en-US" data-theme-mode="system" data-accent="blue">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const root = document.documentElement;
        const locale =
          window.localStorage.getItem("composia.locale") ?? "en-US";
        const themeMode =
          window.localStorage.getItem("composia.theme-mode") ?? "system";
        const accent =
          window.localStorage.getItem("composia.accent-color") ?? "blue";
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        const resolvedTheme =
          themeMode === "system" ? (prefersDark ? "dark" : "light") : themeMode;
        root.lang = locale;
        root.dataset.themeMode = themeMode;
        root.dataset.accent = accent;
        root.classList.toggle("dark", resolvedTheme === "dark");
        root.style.colorScheme = resolvedTheme;
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
