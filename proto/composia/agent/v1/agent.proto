syntax = "proto3";

package composia.agent.v1;

import "google/protobuf/timestamp.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/agent/v1;agentv1";

service AgentReportService {
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportTaskState(ReportTaskStateRequest) returns (ReportTaskStateResponse);
  rpc ReportTaskStepState(ReportTaskStepStateRequest) returns (ReportTaskStepStateResponse);
  rpc UploadTaskLogs(stream UploadTaskLogsRequest) returns (stream UploadTaskLogsResponse);
  rpc ReportBackupResult(ReportBackupResultRequest) returns (ReportBackupResultResponse);
  rpc ReportServiceInstanceStatus(ReportServiceInstanceStatusRequest) returns (ReportServiceInstanceStatusResponse);
  rpc ReportDockerStats(ReportDockerStatsRequest) returns (ReportDockerStatsResponse);
}

service AgentTaskService {
  rpc PullNextTask(PullNextTaskRequest) returns (PullNextTaskResponse);
}

service BundleService {
  rpc GetServiceBundle(GetServiceBundleRequest) returns (stream GetServiceBundleResponse);
}

service DockerService {
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);
  rpc InspectContainer(InspectContainerRequest) returns (InspectContainerResponse);
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse);
  rpc InspectNetwork(InspectNetworkRequest) returns (InspectNetworkResponse);
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);
  rpc InspectVolume(InspectVolumeRequest) returns (InspectVolumeResponse);
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  rpc InspectImage(InspectImageRequest) returns (InspectImageResponse);
}

message HeartbeatRequest {
  string node_id = 1;
  string agent_version = 2;
  google.protobuf.Timestamp sent_at = 3;
  NodeRuntimeSummary runtime = 4;
}

message NodeRuntimeSummary {
  string docker_server_version = 1;
  uint64 disk_total_bytes = 2;
  uint64 disk_free_bytes = 3;
}

message HeartbeatResponse {
  google.protobuf.Timestamp received_at = 1;
}

message PullNextTaskRequest {
  string node_id = 1;
}

message AgentTask {
  string task_id = 1;
  string type = 2;
  string service_name = 3;
  string node_id = 4;
  string repo_revision = 5;
  string service_dir = 6;
  repeated string data_names = 7;
  string params_json = 8;
}

message PullNextTaskResponse {
  bool has_task = 1;
  AgentTask task = 2;
}

message ReportTaskStateRequest {
  string task_id = 1;
  string status = 2;
  string error_summary = 3;
  google.protobuf.Timestamp finished_at = 4;
}

message ReportTaskStateResponse {}

message ReportTaskStepStateRequest {
  string task_id = 1;
  string step_name = 2;
  string status = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp finished_at = 5;
}

message ReportTaskStepStateResponse {}

message UploadTaskLogsRequest {
  string task_id = 1;
  uint64 seq = 2;
  google.protobuf.Timestamp sent_at = 3;
  string content = 4;
}

message UploadTaskLogsResponse {
  string task_id = 1;
  uint64 last_confirmed_seq = 2;
}

message ReportBackupResultRequest {
  string backup_id = 1;
  string task_id = 2;
  string service_name = 3;
  string data_name = 4;
  string status = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp finished_at = 7;
  string artifact_ref = 8;
  string error_summary = 9;
}

message ReportBackupResultResponse {}

message ReportServiceInstanceStatusRequest {
  string service_name = 1;
  string node_id = 2;
  string runtime_status = 3;
  google.protobuf.Timestamp reported_at = 4;
}

message ReportServiceInstanceStatusResponse {}

message GetServiceBundleRequest {
  string task_id = 1;
}

message GetServiceBundleResponse {
  string service_name = 1;
  string repo_revision = 2;
  string relative_root = 3;
  bytes data = 4;
}

message DockerStats {
  uint32 containers_total = 1;
  uint32 containers_running = 2;
  uint32 containers_stopped = 3;
  uint32 containers_paused = 4;
  uint32 images = 5;
  uint32 networks = 6;
  uint32 volumes = 7;
  uint64 volumes_size_bytes = 8;
  uint64 disks_usage_bytes = 9;
  string docker_server_version = 10;
}

message ReportDockerStatsRequest {
  string node_id = 1;
  DockerStats stats = 2;
}

message ReportDockerStatsResponse {}

message ListContainersRequest {}

message ContainerInfo {
  string id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
  string status = 5;
  string created = 6;
  map<string, string> labels = 7;
  repeated string ports = 8;
  repeated string networks = 9;
  string image_id = 10;
}

message ListContainersResponse {
  repeated ContainerInfo containers = 1;
}

message InspectContainerRequest {
  string container_id = 1;
}

message InspectContainerResponse {
  string raw_json = 1;
}

message ListNetworksRequest {}

message NetworkInfo {
  string id = 1;
  string name = 2;
  string driver = 3;
  string scope = 4;
  bool internal = 5;
  bool attachable = 6;
  string created = 7;
  map<string, string> labels = 8;
  string subnet = 9;
  string gateway = 10;
  uint32 containers_count = 11;
  bool ipv6_enabled = 12;
}

message ListNetworksResponse {
  repeated NetworkInfo networks = 1;
}

message InspectNetworkRequest {
  string network_id = 1;
}

message InspectNetworkResponse {
  string raw_json = 1;
}

message ListVolumesRequest {}

message VolumeInfo {
  string name = 1;
  string driver = 2;
  string mountpoint = 3;
  string scope = 4;
  string created = 5;
  map<string, string> labels = 6;
  int64 size_bytes = 7;
  uint32 containers_count = 8;
  bool in_use = 9;
}

message ListVolumesResponse {
  repeated VolumeInfo volumes = 1;
}

message InspectVolumeRequest {
  string volume_name = 1;
}

message InspectVolumeResponse {
  string raw_json = 1;
}

message ListImagesRequest {}

message ImageInfo {
  string id = 1;
  repeated string repo_tags = 2;
  int64 size = 3;
  int64 virtual_size = 4;
  string created = 5;
  repeated string repo_digests = 6;
  string architecture = 7;
  string os = 8;
  string author = 9;
  uint32 containers_count = 10;
  bool is_dangling = 11;
}

message ListImagesResponse {
  repeated ImageInfo images = 1;
}

message InspectImageRequest {
  string image_id = 1;
}

message InspectImageResponse {
  string raw_json = 1;
}
