syntax = "proto3";

package composia.agent.v1;

import "google/protobuf/timestamp.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/agent/v1;agentv1";

// AgentReportService carries agent-to-controller runtime and task reports.
service AgentReportService {
  // Heartbeat reports that an agent is alive and includes runtime metadata.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  // ReportTaskState reports the latest state for one task.
  rpc ReportTaskState(ReportTaskStateRequest) returns (ReportTaskStateResponse);
  // ReportTaskStepState reports the latest state for one task step.
  rpc ReportTaskStepState(ReportTaskStepStateRequest) returns (ReportTaskStepStateResponse);
  // UploadTaskLogs streams log chunks from the agent to the controller.
  rpc UploadTaskLogs(stream UploadTaskLogsRequest) returns (stream UploadTaskLogsResponse);
  // ReportBackupResult reports the result of one backup operation.
  rpc ReportBackupResult(ReportBackupResultRequest) returns (ReportBackupResultResponse);
  // ReportServiceInstanceStatus reports the current status of one service instance.
  rpc ReportServiceInstanceStatus(ReportServiceInstanceStatusRequest) returns (ReportServiceInstanceStatusResponse);
  // ReportServiceImageStates reports image digest observations for one service instance.
  rpc ReportServiceImageStates(ReportServiceImageStatesRequest) returns (ReportServiceImageStatesResponse);
  // ReportServiceImageUpdateChecks reports candidate image updates for one service instance.
  rpc ReportServiceImageUpdateChecks(ReportServiceImageUpdateChecksRequest) returns (ReportServiceImageUpdateChecksResponse);
  // ReportDockerStats reports the latest Docker stats snapshot for one node.
  rpc ReportDockerStats(ReportDockerStatsRequest) returns (ReportDockerStatsResponse);
  // ReportDockerQueryResult reports the result of one direct Docker query.
  rpc ReportDockerQueryResult(ReportDockerQueryResultRequest) returns (ReportDockerQueryResultResponse);
  // OpenExecTunnel proxies interactive exec traffic between controller and agent.
  rpc OpenExecTunnel(stream OpenExecTunnelRequest) returns (stream OpenExecTunnelResponse);
  // OpenContainerLogTunnel proxies live container log traffic between controller and agent.
  rpc OpenContainerLogTunnel(stream OpenContainerLogTunnelRequest) returns (stream OpenContainerLogTunnelResponse);
}

// AgentTaskService lets an agent pull work assigned to its node.
service AgentTaskService {
  // PullNextTask returns the next available task for the requesting node.
  rpc PullNextTask(PullNextTaskRequest) returns (PullNextTaskResponse);
  // PullNextDockerQuery returns the next in-memory Docker query for the requesting node.
  rpc PullNextDockerQuery(PullNextDockerQueryRequest) returns (PullNextDockerQueryResponse);
}

// BundleService streams service bundles needed to execute a task.
service BundleService {
  // GetServiceBundle streams the task bundle as binary chunks.
  rpc GetServiceBundle(GetServiceBundleRequest) returns (stream GetServiceBundleResponse);
}

// DockerService exposes Docker operations that run on the agent node.
service DockerService {
  // ListContainers lists local Docker containers.
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);
  // InspectContainer returns raw Docker inspect JSON for one container.
  rpc InspectContainer(InspectContainerRequest) returns (InspectContainerResponse);
  // RunContainerAction applies a lifecycle action to one container.
  rpc RunContainerAction(RunContainerActionRequest) returns (RunContainerActionResponse);
  // RemoveContainer deletes one container.
  rpc RemoveContainer(RemoveContainerRequest) returns (RemoveContainerResponse);
  // GetContainerLogs streams log text for one container.
  rpc GetContainerLogs(GetContainerLogsRequest) returns (stream GetContainerLogsResponse);
  // ListNetworks lists local Docker networks.
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse);
  // InspectNetwork returns raw Docker inspect JSON for one network.
  rpc InspectNetwork(InspectNetworkRequest) returns (InspectNetworkResponse);
  // RemoveNetwork deletes one network.
  rpc RemoveNetwork(RemoveNetworkRequest) returns (RemoveNetworkResponse);
  // ListVolumes lists local Docker volumes.
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);
  // InspectVolume returns raw Docker inspect JSON for one volume.
  rpc InspectVolume(InspectVolumeRequest) returns (InspectVolumeResponse);
  // RemoveVolume deletes one volume.
  rpc RemoveVolume(RemoveVolumeRequest) returns (RemoveVolumeResponse);
  // ListImages lists local Docker images.
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  // InspectImage returns raw Docker inspect JSON for one image.
  rpc InspectImage(InspectImageRequest) returns (InspectImageResponse);
  // RemoveImage deletes one image.
  rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse);
}

// HeartbeatRequest is the lightweight keepalive sent by an agent.
message HeartbeatRequest {
  // node_id is the stable node identifier.
  string node_id = 1;
  // agent_version is the agent version string.
  string agent_version = 2;
  // sent_at is the agent time when the heartbeat was sent.
  google.protobuf.Timestamp sent_at = 3;
  NodeRuntimeSummary runtime = 4;
}

// NodeRuntimeSummary reports basic runtime capacity for a node.
message NodeRuntimeSummary {
  // docker_server_version is the local Docker Engine version string.
  string docker_server_version = 1;
  // disk_total_bytes is the total disk capacity visible to the agent.
  uint64 disk_total_bytes = 2;
  // disk_free_bytes is the currently free disk capacity visible to the agent.
  uint64 disk_free_bytes = 3;
}

// HeartbeatResponse acknowledges a heartbeat with the controller receive time.
message HeartbeatResponse {
  google.protobuf.Timestamp received_at = 1;
}

// PullNextTaskRequest identifies the node that is requesting work.
message PullNextTaskRequest {
  // node_id is the stable node identifier.
  string node_id = 1;
}

// AgentTask describes one executable task assigned to an agent.
message AgentTask {
  // task_id is the controller task ID assigned to the agent.
  string task_id = 1;
  // type identifies the task kind assigned by the controller.
  AgentTaskType type = 2;
  // service_name is the logical service name.
  string service_name = 3;
  // node_id is the target node ID for the task.
  string node_id = 4;
  // repo_revision is the desired repo revision for this task.
  string repo_revision = 5;
  // service_dir is the task service directory path within the bundle.
  string service_dir = 6;
  // data_names lists selected data entries for backup-like tasks.
  repeated string data_names = 7;
  // params_json stores task-type-specific JSON parameters.
  string params_json = 8;
}

// AgentTaskType identifies one executable task kind.
enum AgentTaskType {
  AGENT_TASK_TYPE_UNSPECIFIED = 0;
  AGENT_TASK_TYPE_DEPLOY = 1;
  AGENT_TASK_TYPE_STOP = 2;
  AGENT_TASK_TYPE_RESTART = 3;
  AGENT_TASK_TYPE_UPDATE = 4;
  AGENT_TASK_TYPE_BACKUP = 5;
  AGENT_TASK_TYPE_RESTORE = 6;
  AGENT_TASK_TYPE_MIGRATE = 7;
  AGENT_TASK_TYPE_DNS_UPDATE = 8;
  AGENT_TASK_TYPE_CADDY_SYNC = 9;
  AGENT_TASK_TYPE_CADDY_RELOAD = 10;
  AGENT_TASK_TYPE_IMAGE_CHECK = 11;
  AGENT_TASK_TYPE_PRUNE = 12;
  AGENT_TASK_TYPE_RUSTIC_INIT = 13;
  AGENT_TASK_TYPE_RUSTIC_FORGET = 14;
  AGENT_TASK_TYPE_RUSTIC_PRUNE = 15;
  AGENT_TASK_TYPE_DOCKER_START = 16;
  AGENT_TASK_TYPE_DOCKER_STOP = 17;
  AGENT_TASK_TYPE_DOCKER_RESTART = 18;
  reserved 19;
  reserved "AGENT_TASK_TYPE_DOCKER_REMOVE";
  AGENT_TASK_TYPE_DOCKER_REMOVE_CONTAINER = 20;
  AGENT_TASK_TYPE_DOCKER_REMOVE_NETWORK = 21;
  AGENT_TASK_TYPE_DOCKER_REMOVE_VOLUME = 22;
  AGENT_TASK_TYPE_DOCKER_REMOVE_IMAGE = 23;
}

// AgentTaskStatus identifies a task lifecycle status reported by an agent.
enum AgentTaskStatus {
  AGENT_TASK_STATUS_UNSPECIFIED = 0;
  AGENT_TASK_STATUS_PENDING = 1;
  AGENT_TASK_STATUS_RUNNING = 2;
  AGENT_TASK_STATUS_AWAITING_CONFIRMATION = 3;
  AGENT_TASK_STATUS_SUCCEEDED = 4;
  AGENT_TASK_STATUS_FAILED = 5;
  AGENT_TASK_STATUS_CANCELLED = 6;
}

// AgentTaskStepName identifies a task step reported by an agent.
enum AgentTaskStepName {
  AGENT_TASK_STEP_NAME_UNSPECIFIED = 0;
  AGENT_TASK_STEP_NAME_RENDER = 1;
  AGENT_TASK_STEP_NAME_PULL = 2;
  AGENT_TASK_STEP_NAME_BACKUP = 3;
  AGENT_TASK_STEP_NAME_COMPOSE_DOWN = 4;
  AGENT_TASK_STEP_NAME_COMPOSE_UP = 5;
  AGENT_TASK_STEP_NAME_TRANSFER = 6;
  AGENT_TASK_STEP_NAME_RESTORE = 7;
  AGENT_TASK_STEP_NAME_DNS_UPDATE = 8;
  AGENT_TASK_STEP_NAME_CADDY_SYNC = 9;
  AGENT_TASK_STEP_NAME_CADDY_RELOAD = 10;
  AGENT_TASK_STEP_NAME_IMAGE_CHECK = 11;
  AGENT_TASK_STEP_NAME_INIT = 12;
  AGENT_TASK_STEP_NAME_PRUNE = 13;
  AGENT_TASK_STEP_NAME_AWAITING_CONFIRMATION = 14;
  AGENT_TASK_STEP_NAME_PERSIST_REPO = 15;
  AGENT_TASK_STEP_NAME_FINALIZE = 16;
  AGENT_TASK_STEP_NAME_DOCKER_START = 17;
  AGENT_TASK_STEP_NAME_DOCKER_STOP = 18;
  AGENT_TASK_STEP_NAME_DOCKER_RESTART = 19;
  AGENT_TASK_STEP_NAME_DOCKER_REMOVE = 20;
}

// DockerQueryErrorCode identifies the normalized error code for a Docker query.
enum DockerQueryErrorCode {
  DOCKER_QUERY_ERROR_CODE_UNSPECIFIED = 0;
  DOCKER_QUERY_ERROR_CODE_INVALID_ARGUMENT = 1;
  DOCKER_QUERY_ERROR_CODE_NOT_FOUND = 2;
  DOCKER_QUERY_ERROR_CODE_FAILED_PRECONDITION = 3;
  DOCKER_QUERY_ERROR_CODE_PERMISSION_DENIED = 4;
  DOCKER_QUERY_ERROR_CODE_DEADLINE_EXCEEDED = 5;
  DOCKER_QUERY_ERROR_CODE_UNAVAILABLE = 6;
  DOCKER_QUERY_ERROR_CODE_INTERNAL = 7;
}

// PullNextTaskResponse indicates whether a task was assigned.
message PullNextTaskResponse {
  // has_task is false when there is currently no task to run.
  bool has_task = 1;
  // task is populated only when has_task is true.
  AgentTask task = 2;
}

// DockerQueryTask describes one synchronous Docker query assigned to an agent.
message DockerQueryTask {
  // query_id is the controller-generated query ID.
  string query_id = 1;
  // node_id is the target node ID for the query.
  string node_id = 2;
  // query carries the typed Docker request to execute.
  oneof query {
    ListContainersRequest list_containers = 3;
    InspectContainerRequest inspect_container = 4;
    ListNetworksRequest list_networks = 5;
    InspectNetworkRequest inspect_network = 6;
    ListVolumesRequest list_volumes = 7;
    InspectVolumeRequest inspect_volume = 8;
    ListImagesRequest list_images = 9;
    InspectImageRequest inspect_image = 10;
    GetContainerLogsRequest container_logs = 11;
    DockerQueryRunContainerExecRequest run_container_exec = 12;
  }
}

// PullNextDockerQueryRequest identifies the node that is requesting a Docker query.
message PullNextDockerQueryRequest {
  // node_id is the stable node identifier.
  string node_id = 1;
}

// PullNextDockerQueryResponse indicates whether a Docker query was assigned.
message PullNextDockerQueryResponse {
  // has_query is false when there is currently no Docker query to run.
  bool has_query = 1;
  // query is populated only when has_query is true.
  DockerQueryTask query = 2;
}

// ReportTaskStateRequest reports the latest task-level state from an agent.
message ReportTaskStateRequest {
  // task_id is the controller task ID being updated.
  string task_id = 1;
  // status is the latest task status observed by the agent.
  AgentTaskStatus status = 2;
  // error_summary contains the task failure summary when the task fails.
  string error_summary = 3;
  // finished_at is set when the task reaches a terminal state.
  google.protobuf.Timestamp finished_at = 4;
}

// ReportTaskStateResponse acknowledges a task state update.
message ReportTaskStateResponse {}

// ReportTaskStepStateRequest reports the latest task step state from an agent.
message ReportTaskStepStateRequest {
  // task_id is the controller task ID being updated.
  string task_id = 1;
  // step_name identifies the step being updated.
  AgentTaskStepName step_name = 2;
  // status is the latest step status observed by the agent.
  AgentTaskStatus status = 3;
  // started_at is set when the step begins.
  google.protobuf.Timestamp started_at = 4;
  // finished_at is set when the step reaches a terminal state.
  google.protobuf.Timestamp finished_at = 5;
}

// ReportTaskStepStateResponse acknowledges a task step state update.
message ReportTaskStepStateResponse {}

// UploadTaskLogsRequest carries one ordered log chunk for a task.
message UploadTaskLogsRequest {
  // task_id is the controller task ID receiving the log chunk.
  string task_id = 1;
  // seq is a monotonically increasing sequence number per task log stream.
  uint64 seq = 2;
  // sent_at is the agent time when this log chunk was sent.
  google.protobuf.Timestamp sent_at = 3;
  // content is the incremental log payload.
  string content = 4;
}

// UploadTaskLogsResponse acknowledges received task log chunks.
message UploadTaskLogsResponse {
  // task_id is the controller task ID receiving the acknowledgement.
  string task_id = 1;
  // last_confirmed_seq is the last sequence the controller accepted.
  uint64 last_confirmed_seq = 2;
}

// OpenExecTunnelRequest carries one frame for an interactive exec session.
message OpenExecTunnelRequest {
  // session_id identifies the interactive exec session.
  string session_id = 1;
  // kind identifies the frame type carried in this message.
  string kind = 2;
  // payload holds raw terminal or control bytes for the frame.
  bytes payload = 3;
  // rows is the terminal row count carried by resize frames.
  uint32 rows = 4;
  // cols is the terminal column count carried by resize frames.
  uint32 cols = 5;
  // node_id identifies the node that should execute the command.
  string node_id = 6;
  // container_id identifies the target container for the exec session.
  string container_id = 7;
  // command stores the exec command and arguments.
  repeated string command = 8;
}

// OpenExecTunnelResponse carries one frame back to the controller side.
message OpenExecTunnelResponse {
  // session_id identifies the interactive exec session.
  string session_id = 1;
  // kind identifies the frame type carried in this message.
  string kind = 2;
  // payload holds raw terminal or control bytes for the frame.
  bytes payload = 3;
  // rows is the terminal row count carried by resize frames.
  uint32 rows = 4;
  // cols is the terminal column count carried by resize frames.
  uint32 cols = 5;
  // error contains the frame-level error message, when present.
  string error = 6;
  // container_id identifies the target container for the exec session.
  string container_id = 7;
  // command stores the exec command and arguments.
  repeated string command = 8;
}

// OpenContainerLogTunnelRequest carries one container log tunnel frame to the controller.
message OpenContainerLogTunnelRequest {
  // session_id identifies the container log session.
  string session_id = 1;
  // kind identifies the frame type carried in this message.
  string kind = 2;
  // content carries one log chunk for chunk frames.
  string content = 3;
  // error_message contains the frame-level failure summary, when present.
  string error_message = 4;
  // error_code carries a Connect-style lowercase code string such as not_found.
  string error_code = 5;
}

// OpenContainerLogTunnelResponse carries one container log tunnel frame to the agent.
message OpenContainerLogTunnelResponse {
  // session_id identifies the container log session.
  string session_id = 1;
  // kind identifies the frame type carried in this message.
  string kind = 2;
  // container_id identifies the target container for the log session.
  string container_id = 3;
  // tail is forwarded to the Docker log tail option for the session.
  string tail = 4;
  // timestamps includes Docker timestamps in streamed log chunks.
  bool timestamps = 5;
}

// ReportBackupResultRequest reports the result of one backup execution.
message ReportBackupResultRequest {
  // backup_id is the backup record ID being updated.
  string backup_id = 1;
  // task_id is the controller task ID that triggered the backup.
  string task_id = 2;
  // service_name is the logical service name.
  string service_name = 3;
  // data_name is the service data entry that was backed up.
  string data_name = 4;
  // status is the latest backup status string observed by the agent.
  string status = 5;
  // started_at is the backup start time.
  google.protobuf.Timestamp started_at = 6;
  // finished_at is set when the backup reaches a terminal state.
  google.protobuf.Timestamp finished_at = 7;
  // artifact_ref identifies the produced backup artifact, when present.
  string artifact_ref = 8;
  // error_summary contains the failure summary when the backup fails.
  string error_summary = 9;
}

// ReportBackupResultResponse acknowledges a backup result update.
message ReportBackupResultResponse {}

// ReportServiceInstanceStatusRequest reports one service instance runtime snapshot.
message ReportServiceInstanceStatusRequest {
  // service_name is the logical service name.
  string service_name = 1;
  // node_id is the stable node identifier.
  string node_id = 2;
  // runtime_status is the latest instance status string observed by the agent.
  string runtime_status = 3;
  // reported_at is the time when the status snapshot was observed.
  google.protobuf.Timestamp reported_at = 4;
}

// ReportServiceInstanceStatusResponse acknowledges a service status update.
message ReportServiceInstanceStatusResponse {}

// ServiceImageState describes one compose service image digest observation.
message ServiceImageState {
  string compose_service = 1;
  string image_ref = 2;
  string local_digest = 3;
  string remote_digest = 4;
  bool local_digest_observed = 5;
  bool remote_digest_observed = 6;
  string check_status = 7;
  string error_summary = 8;
}

// ReportServiceImageStatesRequest reports image digests observed by one agent.
message ReportServiceImageStatesRequest {
  string service_name = 1;
  string node_id = 2;
  repeated ServiceImageState images = 3;
  google.protobuf.Timestamp reported_at = 4;
}

// ReportServiceImageStatesResponse acknowledges image state updates.
message ReportServiceImageStatesResponse {}

// ServiceImageUpdateCheck describes one configured image update check result.
message ServiceImageUpdateCheck {
  string image_name = 1;
  string image_ref = 2;
  string policy_type = 3;
  string current_value = 4;
  string current_tag = 5;
  string current_digest = 6;
  string candidate_tag = 7;
  string candidate_digest = 8;
  repeated string candidate_tags = 9;
  bool update_available = 10;
  string check_status = 11;
  string error_summary = 12;
}

// ReportServiceImageUpdateChecksRequest reports candidate image updates observed by one agent.
message ReportServiceImageUpdateChecksRequest {
  string service_name = 1;
  string node_id = 2;
  repeated ServiceImageUpdateCheck checks = 3;
  google.protobuf.Timestamp reported_at = 4;
}

// ReportServiceImageUpdateChecksResponse acknowledges image update check results.
message ReportServiceImageUpdateChecksResponse {}

// GetServiceBundleRequest identifies the task whose bundle should be streamed.
message GetServiceBundleRequest {
  // task_id is the controller task ID whose bundle should be streamed.
  string task_id = 1;
  // service_dir overrides the task service directory for multi-service bundle consumers.
  string service_dir = 2;
}

// GetServiceBundleResponse carries one binary chunk from a task bundle stream.
message GetServiceBundleResponse {
  // service_name is the logical service name.
  string service_name = 1;
  // repo_revision is the repo revision packaged in the bundle.
  string repo_revision = 2;
  // relative_root is the relative root path for the streamed bundle contents.
  string relative_root = 3;
  // data contains one chunk of the bundle payload.
  bytes data = 4;
}

// DockerStats describes a node-level Docker usage snapshot.
message DockerStats {
  uint32 containers_total = 1;
  // containers_running is the number of running containers.
  uint32 containers_running = 2;
  // containers_stopped is the number of stopped containers.
  uint32 containers_stopped = 3;
  // containers_paused is the number of paused containers.
  uint32 containers_paused = 4;
  // images is the number of local Docker images.
  uint32 images = 5;
  // networks is the number of local Docker networks.
  uint32 networks = 6;
  // volumes is the number of local Docker volumes.
  uint32 volumes = 7;
  // volumes_size_bytes is the total reported volume size in bytes.
  uint64 volumes_size_bytes = 8;
  // disks_usage_bytes is the Docker-reported disk usage in bytes.
  uint64 disks_usage_bytes = 9;
  string docker_server_version = 10;
}

// ReportDockerStatsRequest reports the latest node Docker stats snapshot.
message ReportDockerStatsRequest {
  // node_id is the stable node identifier.
  string node_id = 1;
  // stats is the current Docker usage snapshot for the node.
  DockerStats stats = 2;
}

// ReportDockerStatsResponse acknowledges a Docker stats update.
message ReportDockerStatsResponse {}

// ReportDockerQueryResultRequest reports the result of one direct Docker query.
message ReportDockerQueryResultRequest {
  // query_id is the controller-generated query ID.
  string query_id = 1;
  // node_id is the stable node identifier that executed the query.
  string node_id = 2;
  // result carries the typed Docker query result on success.
  oneof result {
    ListContainersResponse list_containers = 3;
    InspectContainerResponse inspect_container = 4;
    ListNetworksResponse list_networks = 5;
    InspectNetworkResponse inspect_network = 6;
    ListVolumesResponse list_volumes = 7;
    InspectVolumeResponse inspect_volume = 8;
    ListImagesResponse list_images = 9;
    InspectImageResponse inspect_image = 10;
    GetContainerLogsResponse container_logs = 11;
    DockerQueryRunContainerExecResponse run_container_exec = 12;
  }
  // error_message contains the human-readable failure summary when the query fails.
  string error_message = 13;
  // error_code carries the normalized failure code when the query fails.
  DockerQueryErrorCode error_code = 14;
}

// ReportDockerQueryResultResponse acknowledges a Docker query result.
message ReportDockerQueryResultResponse {}

// ListContainersRequest requests all local Docker containers.
message ListContainersRequest {
  // page_size is the requested page size.
  uint32 page_size = 1;
  // page is the 1-based page number.
  uint32 page = 2;
  // search is a case-insensitive substring match across key fields.
  string search = 3;
  // sort_by identifies the field used to sort results.
  string sort_by = 4;
  // sort_desc reverses the sort order when true.
  bool sort_desc = 5;
}

// ContainerInfo describes one container for list views.
message ContainerInfo {
  string id = 1;
  // name is the runtime container name.
  string name = 2;
  string image = 3;
  // state is the low-level Docker state value.
  string state = 4;
  // status is the Docker status string intended for display.
  string status = 5;
  // created is the container creation timestamp string.
  string created = 6;
  // labels is the container label map.
  map<string, string> labels = 7;
  // ports contains display-formatted published port mappings.
  repeated string ports = 8;
  // networks lists connected Docker network names.
  repeated string networks = 9;
  // image_id is the resolved image ID.
  string image_id = 10;
}

// ListContainersResponse returns local container summaries.
message ListContainersResponse {
  repeated ContainerInfo containers = 1;
  uint32 total_count = 2;
}

// InspectContainerRequest identifies one local container.
message InspectContainerRequest {
  // container_id is the runtime container ID.
  string container_id = 1;
}

// InspectContainerResponse returns raw Docker inspect JSON.
message InspectContainerResponse {
  string raw_json = 1;
}

// ContainerAction identifies a container lifecycle action.
enum ContainerAction {
  // CONTAINER_ACTION_UNSPECIFIED is invalid and should not be used.
  CONTAINER_ACTION_UNSPECIFIED = 0;
  // CONTAINER_ACTION_START starts the container.
  CONTAINER_ACTION_START = 1;
  // CONTAINER_ACTION_STOP stops the container.
  CONTAINER_ACTION_STOP = 2;
  // CONTAINER_ACTION_RESTART restarts the container.
  CONTAINER_ACTION_RESTART = 3;
}

// RunContainerActionRequest identifies one local container action.
message RunContainerActionRequest {
  string container_id = 1;
  ContainerAction action = 2;
}

// RunContainerActionResponse acknowledges a local container action request.
message RunContainerActionResponse {}

// RemoveContainerRequest identifies one local container deletion.
message RemoveContainerRequest {
  // container_id is the runtime container ID.
  string container_id = 1;
  // force deletes the container even if it is running.
  bool force = 2;
  // remove_volumes also removes anonymous volumes attached to the container.
  bool remove_volumes = 3;
}

// RemoveContainerResponse acknowledges one local container deletion request.
message RemoveContainerResponse {}

// GetContainerLogsRequest fetches logs for one local container.
message GetContainerLogsRequest {
  // container_id is the runtime container ID.
  string container_id = 1;
  // tail is forwarded to the Docker log tail option.
  string tail = 2;
  // timestamps includes Docker timestamps in the returned log output.
  bool timestamps = 3;
}

// GetContainerLogsResponse returns one streamed log chunk.
message GetContainerLogsResponse {
  string content = 1;
}

// DockerQueryRunContainerExecRequest runs a non-interactive command in one local container.
message DockerQueryRunContainerExecRequest {
  string container_id = 1;
  repeated string command = 2;
  bytes stdin = 3;
  uint32 timeout_seconds = 4;
  uint64 max_output_bytes = 5;
}

// DockerQueryRunContainerExecResponse returns the collected exec result.
message DockerQueryRunContainerExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  bool timed_out = 4;
  bool stdout_truncated = 5;
  bool stderr_truncated = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp finished_at = 8;
  string duration = 9;
}

// ListNetworksRequest requests all local Docker networks.
message ListNetworksRequest {
  // page_size is the requested page size.
  uint32 page_size = 1;
  // page is the 1-based page number.
  uint32 page = 2;
  // search is a case-insensitive substring match across key fields.
  string search = 3;
  // sort_by identifies the field used to sort results.
  string sort_by = 4;
  // sort_desc reverses the sort order when true.
  bool sort_desc = 5;
}

// NetworkInfo describes one Docker network for list views.
message NetworkInfo {
  string id = 1;
  // name is the runtime network name.
  string name = 2;
  // driver is the Docker network driver name.
  string driver = 3;
  // scope is the Docker network scope.
  string scope = 4;
  // internal reports whether the network is internal-only.
  bool internal = 5;
  // attachable reports whether standalone containers may attach to the network.
  bool attachable = 6;
  // created is the network creation timestamp string.
  string created = 7;
  // labels is the network label map.
  map<string, string> labels = 8;
  // subnet is the primary IPv4 subnet, when available.
