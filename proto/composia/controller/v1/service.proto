syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";
import "proto/composia/controller/v1/backup.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service ServiceService {
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);
  rpc GetServiceTasks(GetServiceTasksRequest) returns (GetServiceTasksResponse);
  rpc GetServiceBackups(GetServiceBackupsRequest) returns (GetServiceBackupsResponse);
  rpc BackupService(BackupServiceRequest) returns (BackupServiceResponse);
  rpc DeployService(DeployServiceRequest) returns (DeployServiceResponse);
  rpc UpdateService(UpdateServiceRequest) returns (UpdateServiceResponse);
  rpc StopService(StopServiceRequest) returns (StopServiceResponse);
  rpc RestartService(RestartServiceRequest) returns (RestartServiceResponse);
}

message GetServiceRequest {
  string service_name = 1;
}

message GetServiceResponse {
  string name = 1;
  string runtime_status = 2;
  string updated_at = 3;
  string node = 4;
  bool enabled = 5;
}

message GetServiceTasksRequest {
  string service_name = 1;
  string status = 2;
  uint32 page_size = 3;
  string cursor = 4;
}

message GetServiceTasksResponse {
  repeated TaskSummary tasks = 1;
  string next_cursor = 2;
}

message GetServiceBackupsRequest {
  string service_name = 1;
  string status = 2;
  string data_name = 3;
  uint32 page_size = 4;
  string cursor = 5;
}

message GetServiceBackupsResponse {
  repeated BackupSummary backups = 1;
  string next_cursor = 2;
}

message BackupServiceRequest {
  string service_name = 1;
  repeated string data_names = 2;
}

message BackupServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message DeployServiceRequest {
  string service_name = 1;
}

message DeployServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message UpdateServiceRequest {
  string service_name = 1;
}

message UpdateServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message StopServiceRequest {
  string service_name = 1;
}

message StopServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message RestartServiceRequest {
  string service_name = 1;
}

message RestartServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message ListServicesRequest {
  string runtime_status = 1;
  uint32 page_size = 2;
  string cursor = 3;
}

message ServiceSummary {
  string name = 1;
  bool is_declared = 2;
  string runtime_status = 3;
  string updated_at = 4;
}

message ListServicesResponse {
  repeated ServiceSummary services = 1;
  string next_cursor = 2;
}
