syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";
import "proto/composia/controller/v1/backup.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service ServiceService {
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);
  rpc GetServiceTasks(GetServiceTasksRequest) returns (GetServiceTasksResponse);
  rpc GetServiceBackups(GetServiceBackupsRequest) returns (GetServiceBackupsResponse);
  rpc UpdateServiceTargetNodes(UpdateServiceTargetNodesRequest) returns (UpdateServiceTargetNodesResponse);
  rpc RunServiceAction(RunServiceActionRequest) returns (TaskActionResponse);
}

service ServiceInstanceService {
  rpc ListServiceInstances(ListServiceInstancesRequest) returns (ListServiceInstancesResponse);
  rpc GetServiceInstance(GetServiceInstanceRequest) returns (GetServiceInstanceResponse);
  rpc RunServiceInstanceAction(RunServiceInstanceActionRequest) returns (TaskActionResponse);
}

message ServiceInstanceSummary {
  string service_name = 1;
  string node_id = 2;
  string runtime_status = 3;
  string updated_at = 4;
  bool is_declared = 5;
}

message ServiceContainerSummary {
  string container_id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
  string status = 5;
  string created = 6;
  string compose_project = 7;
  string compose_service = 8;
}

message ServiceInstanceDetail {
  string service_name = 1;
  string node_id = 2;
  string runtime_status = 3;
  string updated_at = 4;
  bool is_declared = 5;
  repeated ServiceContainerSummary containers = 6;
}

message GetServiceRequest {
  string service_name = 1;
}

message GetServiceResponse {
  string name = 1;
  string runtime_status = 2;
  string updated_at = 3;
  repeated string nodes = 4;
  bool enabled = 5;
  string directory = 6;
  repeated ServiceInstanceDetail instances = 7;
}

message ListServiceInstancesRequest {
  string service_name = 1;
}

message ListServiceInstancesResponse {
  repeated ServiceInstanceSummary instances = 1;
}

message GetServiceInstanceRequest {
  string service_name = 1;
  string node_id = 2;
}

message GetServiceInstanceResponse {
  ServiceInstanceDetail instance = 1;
}

message GetServiceTasksRequest {
  string service_name = 1;
  string status = 2;
  uint32 page_size = 3;
  uint32 page = 4;
}

message GetServiceTasksResponse {
  repeated TaskSummary tasks = 1;
  uint32 total_count = 2;
}

message GetServiceBackupsRequest {
  string service_name = 1;
  string status = 2;
  string data_name = 3;
  uint32 page_size = 4;
  uint32 page = 5;
}

message GetServiceBackupsResponse {
  repeated BackupSummary backups = 1;
  uint32 total_count = 2;
}

message UpdateServiceTargetNodesRequest {
  string service_name = 1;
  repeated string node_ids = 2;
  string base_revision = 3;
  string commit_message = 4;
}

message UpdateServiceTargetNodesResponse {
  string commit_id = 1;
  string sync_status = 2;
  string push_error = 3;
  string last_successful_pull_at = 4;
}

enum ServiceAction {
  SERVICE_ACTION_UNSPECIFIED = 0;
  SERVICE_ACTION_DEPLOY = 1;
  SERVICE_ACTION_UPDATE = 2;
  SERVICE_ACTION_STOP = 3;
  SERVICE_ACTION_RESTART = 4;
  SERVICE_ACTION_BACKUP = 5;
  SERVICE_ACTION_DNS_UPDATE = 6;
  SERVICE_ACTION_CADDY_SYNC = 7;
}

message RunServiceActionRequest {
  string service_name = 1;
  ServiceAction action = 2;
  repeated string node_ids = 3;
  repeated string data_names = 4;
}

enum ServiceInstanceAction {
  SERVICE_INSTANCE_ACTION_UNSPECIFIED = 0;
  SERVICE_INSTANCE_ACTION_DEPLOY = 1;
  SERVICE_INSTANCE_ACTION_UPDATE = 2;
  SERVICE_INSTANCE_ACTION_STOP = 3;
  SERVICE_INSTANCE_ACTION_RESTART = 4;
}

message RunServiceInstanceActionRequest {
  string service_name = 1;
  string node_id = 2;
  ServiceInstanceAction action = 3;
}

message ListServicesRequest {
  string runtime_status = 1;
  uint32 page_size = 2;
  uint32 page = 3;
}

message ServiceSummary {
  string name = 1;
  bool is_declared = 2;
  string runtime_status = 3;
  string updated_at = 4;
  uint32 instance_count = 5;
  uint32 running_count = 6;
  uint32 target_node_count = 7;
}

message ListServicesResponse {
  repeated ServiceSummary services = 1;
  uint32 total_count = 2;
}
