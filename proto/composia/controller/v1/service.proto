syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";
import "proto/composia/controller/v1/backup.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service ServiceService {
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);
  rpc GetServiceTasks(GetServiceTasksRequest) returns (GetServiceTasksResponse);
  rpc GetServiceBackups(GetServiceBackupsRequest) returns (GetServiceBackupsResponse);
  rpc BackupService(BackupServiceRequest) returns (BackupServiceResponse);
  rpc UpdateServiceDNS(UpdateServiceDNSRequest) returns (UpdateServiceDNSResponse);
  rpc DeployService(DeployServiceRequest) returns (DeployServiceResponse);
  rpc UpdateService(UpdateServiceRequest) returns (UpdateServiceResponse);
  rpc StopService(StopServiceRequest) returns (StopServiceResponse);
  rpc RestartService(RestartServiceRequest) returns (RestartServiceResponse);
}

service ServiceInstanceService {
  rpc ListServiceInstances(ListServiceInstancesRequest) returns (ListServiceInstancesResponse);
  rpc GetServiceInstance(GetServiceInstanceRequest) returns (GetServiceInstanceResponse);
  rpc DeployServiceInstance(DeployServiceInstanceRequest) returns (DeployServiceInstanceResponse);
  rpc UpdateServiceInstance(UpdateServiceInstanceRequest) returns (UpdateServiceInstanceResponse);
  rpc StopServiceInstance(StopServiceInstanceRequest) returns (StopServiceInstanceResponse);
  rpc RestartServiceInstance(RestartServiceInstanceRequest) returns (RestartServiceInstanceResponse);
}

message ServiceInstanceSummary {
  string service_name = 1;
  string node_id = 2;
  string runtime_status = 3;
  string updated_at = 4;
  bool is_declared = 5;
}

message GetServiceRequest {
  string service_name = 1;
}

message GetServiceResponse {
  string name = 1;
  string runtime_status = 2;
  string updated_at = 3;
  repeated string nodes = 4;
  bool enabled = 5;
  string directory = 6;
  repeated ServiceInstanceSummary instances = 7;
}

message ListServiceInstancesRequest {
  string service_name = 1;
}

message ListServiceInstancesResponse {
  repeated ServiceInstanceSummary instances = 1;
}

message GetServiceInstanceRequest {
  string service_name = 1;
  string node_id = 2;
}

message GetServiceInstanceResponse {
  ServiceInstanceSummary instance = 1;
}

message GetServiceTasksRequest {
  string service_name = 1;
  string status = 2;
  uint32 page_size = 3;
  uint32 page = 4;
}

message GetServiceTasksResponse {
  repeated TaskSummary tasks = 1;
  uint32 total_count = 2;
}

message GetServiceBackupsRequest {
  string service_name = 1;
  string status = 2;
  string data_name = 3;
  uint32 page_size = 4;
  uint32 page = 5;
}

message GetServiceBackupsResponse {
  repeated BackupSummary backups = 1;
  uint32 total_count = 2;
}

message BackupServiceRequest {
  string service_name = 1;
  repeated string data_names = 2;
  repeated string node_ids = 3;
}

message BackupServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message UpdateServiceDNSRequest {
  string service_name = 1;
}

message UpdateServiceDNSResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message DeployServiceRequest {
  string service_name = 1;
  repeated string node_ids = 2;
}

message DeployServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message UpdateServiceRequest {
  string service_name = 1;
  repeated string node_ids = 2;
}

message UpdateServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message StopServiceRequest {
  string service_name = 1;
  repeated string node_ids = 2;
}

message StopServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message RestartServiceRequest {
  string service_name = 1;
  repeated string node_ids = 2;
}

message DeployServiceInstanceRequest {
  string service_name = 1;
  string node_id = 2;
}

message DeployServiceInstanceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message UpdateServiceInstanceRequest {
  string service_name = 1;
  string node_id = 2;
}

message UpdateServiceInstanceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message StopServiceInstanceRequest {
  string service_name = 1;
  string node_id = 2;
}

message StopServiceInstanceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message RestartServiceInstanceRequest {
  string service_name = 1;
  string node_id = 2;
}

message RestartServiceInstanceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message RestartServiceResponse {
  string task_id = 1;
  string status = 2;
  string repo_revision = 3;
}

message ListServicesRequest {
  string runtime_status = 1;
  uint32 page_size = 2;
  uint32 page = 3;
}

message ServiceSummary {
  string name = 1;
  bool is_declared = 2;
  string runtime_status = 3;
  string updated_at = 4;
  uint32 instance_count = 5;
  uint32 running_count = 6;
  uint32 target_node_count = 7;
}

message ListServicesResponse {
  repeated ServiceSummary services = 1;
  uint32 total_count = 2;
}
