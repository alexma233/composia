syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service NodeService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetNodeTasks(GetNodeTasksRequest) returns (GetNodeTasksResponse);
}

message ListNodesRequest {}

message GetNodeRequest {
  string node_id = 1;
}

message NodeSummary {
  string node_id = 1;
  string display_name = 2;
  bool enabled = 3;
  bool is_online = 4;
  string last_heartbeat = 5;
}

message ListNodesResponse {
  repeated NodeSummary nodes = 1;
}

message GetNodeResponse {
  NodeSummary node = 1;
}

message GetNodeTasksRequest {
  string node_id = 1;
  string status = 2;
  uint32 page_size = 3;
  string cursor = 4;
}

message GetNodeTasksResponse {
  repeated TaskSummary tasks = 1;
  string next_cursor = 2;
}
