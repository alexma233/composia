syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service NodeService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetNodeTasks(GetNodeTasksRequest) returns (GetNodeTasksResponse);
  rpc GetNodeDockerStats(GetNodeDockerStatsRequest) returns (GetNodeDockerStatsResponse);
  rpc PruneNodeDocker(PruneNodeDockerRequest) returns (PruneNodeDockerResponse);
  rpc ListNodeContainers(ListNodeContainersRequest) returns (ListNodeContainersResponse);
  rpc InspectNodeContainer(InspectNodeContainerRequest) returns (InspectNodeContainerResponse);
  rpc ListNodeNetworks(ListNodeNetworksRequest) returns (ListNodeNetworksResponse);
  rpc InspectNodeNetwork(InspectNodeNetworkRequest) returns (InspectNodeNetworkResponse);
  rpc ListNodeVolumes(ListNodeVolumesRequest) returns (ListNodeVolumesResponse);
  rpc InspectNodeVolume(InspectNodeVolumeRequest) returns (InspectNodeVolumeResponse);
  rpc ListNodeImages(ListNodeImagesRequest) returns (ListNodeImagesResponse);
  rpc InspectNodeImage(InspectNodeImageRequest) returns (InspectNodeImageResponse);
}

message ListNodesRequest {}

message GetNodeRequest {
  string node_id = 1;
}

message NodeSummary {
  string node_id = 1;
  string display_name = 2;
  bool enabled = 3;
  bool is_online = 4;
  string last_heartbeat = 5;
}

message ListNodesResponse {
  repeated NodeSummary nodes = 1;
}

message GetNodeResponse {
  NodeSummary node = 1;
}

message GetNodeTasksRequest {
  string node_id = 1;
  string status = 2;
  uint32 page_size = 3;
  string cursor = 4;
}

message GetNodeTasksResponse {
  repeated TaskSummary tasks = 1;
  string next_cursor = 2;
}

message GetNodeDockerStatsRequest {
  string node_id = 1;
}

message DockerStats {
  uint32 containers_total = 1;
  uint32 containers_running = 2;
  uint32 containers_stopped = 3;
  uint32 containers_paused = 4;
  uint32 images = 5;
  uint32 networks = 6;
  uint32 volumes = 7;
  uint64 volumes_size_bytes = 8;
  uint64 disks_usage_bytes = 9;
  string docker_server_version = 10;
}

message GetNodeDockerStatsResponse {
  DockerStats stats = 1;
}

message PruneNodeDockerRequest {
  string node_id = 1;
  string target = 2;
}

message PruneNodeDockerResponse {
  string task_id = 1;
}

message ListNodeContainersRequest {
  string node_id = 1;
}

message ContainerInfo {
  string id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
  string status = 5;
  string created = 6;
  map<string, string> labels = 7;
  repeated string ports = 8;
  repeated string networks = 9;
  string image_id = 10;
}

message ListNodeContainersResponse {
  repeated ContainerInfo containers = 1;
}

message InspectNodeContainerRequest {
  string node_id = 1;
  string container_id = 2;
}

message InspectNodeContainerResponse {
  string raw_json = 1;
}

message ListNodeNetworksRequest {
  string node_id = 1;
}

message NetworkInfo {
  string id = 1;
  string name = 2;
  string driver = 3;
  string scope = 4;
  bool internal = 5;
  bool attachable = 6;
  string created = 7;
  map<string, string> labels = 8;
  string subnet = 9;
  string gateway = 10;
  uint32 containers_count = 11;
  bool ipv6_enabled = 12;
}

message ListNodeNetworksResponse {
  repeated NetworkInfo networks = 1;
}

message InspectNodeNetworkRequest {
  string node_id = 1;
  string network_id = 2;
}

message InspectNodeNetworkResponse {
  string raw_json = 1;
}

message ListNodeVolumesRequest {
  string node_id = 1;
}

message VolumeInfo {
  string name = 1;
  string driver = 2;
  string mountpoint = 3;
  string scope = 4;
  string created = 5;
  map<string, string> labels = 6;
  int64 size_bytes = 7;
  uint32 containers_count = 8;
  bool in_use = 9;
}

message ListNodeVolumesResponse {
  repeated VolumeInfo volumes = 1;
}

message InspectNodeVolumeRequest {
  string node_id = 1;
  string volume_name = 2;
}

message InspectNodeVolumeResponse {
  string raw_json = 1;
}

message ListNodeImagesRequest {
  string node_id = 1;
}

message ImageInfo {
  string id = 1;
  repeated string repo_tags = 2;
  int64 size = 3;
  string created = 4;
  repeated string repo_digests = 5;
  int64 virtual_size = 6;
  string architecture = 7;
  string os = 8;
  uint32 containers_count = 9;
  bool is_dangling = 10;
}

message ListNodeImagesResponse {
  repeated ImageInfo images = 1;
}

message InspectNodeImageRequest {
  string node_id = 1;
  string image_id = 2;
}

message InspectNodeImageResponse {
  string raw_json = 1;
}
