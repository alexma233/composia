syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";
import "proto/composia/controller/v1/system.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

// BackupRecordService exposes read-only backup record queries.
service BackupRecordService {
  // ListBackups returns backup records with filtering and pagination.
  rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);
  // GetBackup returns one backup record by ID.
  rpc GetBackup(GetBackupRequest) returns (GetBackupResponse);
  // RestoreBackup starts an async restore task from one backup record.
  rpc RestoreBackup(RestoreBackupRequest) returns (TaskActionResponse);
}

// BackupSummary describes one backup record in list results.
message BackupSummary {
  string backup_id = 1;
  // task_id links the backup record to the originating task.
  string task_id = 2;
  string service_name = 3;
  string data_name = 4;
  // status is the latest backup status string.
  string status = 5;
  // started_at is the backup start timestamp string.
  string started_at = 6;
  // finished_at is empty until the backup reaches a terminal state.
  string finished_at = 7;
  string node_id = 8;
}

// ListBackupsRequest filters backup records by included and excluded values.
message ListBackupsRequest {
  // service_name includes only backups for these services.
  repeated string service_name = 1;
  // status includes only backups matching one of these status strings.
  repeated string status = 2;
  // data_name includes only backups for these service data entries.
  repeated string data_name = 3;
  // page_size is the requested page size.
  uint32 page_size = 4;
  // page is the 1-based page number.
  uint32 page = 5;
  // node_id includes only backups for these source nodes.
  repeated string node_id = 6;
  // exclude_service_name removes backups for these services.
  repeated string exclude_service_name = 7;
  // exclude_status removes backups matching these status strings.
  repeated string exclude_status = 8;
  // exclude_data_name removes backups for these service data entries.
  repeated string exclude_data_name = 9;
  // exclude_node_id removes backups for these source nodes.
  repeated string exclude_node_id = 10;
}

// ListBackupsResponse returns one page of backup records.
message ListBackupsResponse {
  repeated BackupSummary backups = 1;
  uint32 total_count = 2;
}

// GetBackupRequest identifies one backup record by ID.
message GetBackupRequest {
  string backup_id = 1;
}

// GetBackupResponse describes one backup record in detail.
message GetBackupResponse {
  string backup_id = 1;
  // task_id links the backup record to the originating task.
  string task_id = 2;
  string service_name = 3;
  string data_name = 4;
  // status is the latest backup status string.
  string status = 5;
  // started_at is the backup start timestamp string.
  string started_at = 6;
  // finished_at is empty until the backup reaches a terminal state.
  string finished_at = 7;
  // artifact_ref identifies the produced backup artifact, when present.
  string artifact_ref = 8;
  // error_summary contains the failure summary when the backup fails.
  string error_summary = 9;
  // actions describes whether backup-scoped actions may currently run.
  BackupActionCapabilities actions = 10;
  string node_id = 11;
}

// BackupActionCapabilities describes whether backup-scoped actions may run.
message BackupActionCapabilities {
  Capability restore = 1;
}

// RestoreBackupRequest identifies the backup record and target node for one restore task.
message RestoreBackupRequest {
  string backup_id = 1;
  // node_id identifies the destination node for the restore task.
  string node_id = 2;
}
