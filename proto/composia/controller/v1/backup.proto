syntax = "proto3";

package composia.controller.v1;

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service BackupRecordService {
  rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);
  rpc GetBackup(GetBackupRequest) returns (GetBackupResponse);
}

message BackupSummary {
  string backup_id = 1;
  string task_id = 2;
  string service_name = 3;
  string data_name = 4;
  string status = 5;
  string started_at = 6;
  string finished_at = 7;
}

message ListBackupsRequest {
  string service_name = 1;
  string status = 2;
  string data_name = 3;
  uint32 page_size = 4;
  string cursor = 5;
}

message ListBackupsResponse {
  repeated BackupSummary backups = 1;
  string next_cursor = 2;
}

message GetBackupRequest {
  string backup_id = 1;
}

message GetBackupResponse {
  string backup_id = 1;
  string task_id = 2;
  string service_name = 3;
  string data_name = 4;
  string status = 5;
  string started_at = 6;
  string finished_at = 7;
  string artifact_ref = 8;
  string error_summary = 9;
}
