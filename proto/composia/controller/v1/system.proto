syntax = "proto3";

package composia.controller.v1;

import "google/protobuf/timestamp.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

// SystemService exposes read-only controller status and config summary data.
service SystemService {
  // GetSystemStatus returns the current controller status and node counts.
  rpc GetSystemStatus(GetSystemStatusRequest) returns (GetSystemStatusResponse);
  // ReloadControllerConfig validates and applies the controller config without replacing the process.
  rpc ReloadControllerConfig(ReloadControllerConfigRequest) returns (ReloadControllerConfigResponse);
  // GetCurrentConfig returns the active controller config as a redacted summary.
  rpc GetCurrentConfig(GetCurrentConfigRequest) returns (GetCurrentConfigResponse);
  // GetCapabilities returns global feature availability for the current controller state.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

// GetSystemStatusRequest requests the current controller runtime state.
message GetSystemStatusRequest {}

// GetSystemStatusResponse describes the current controller runtime state.
message GetSystemStatusResponse {
  // version is the controller version string.
  string version = 1;
  // now is the controller time when the response was generated.
  google.protobuf.Timestamp now = 2;
  // configured_node_count is the number of nodes present in config.
  uint64 configured_node_count = 3;
  // online_node_count is the number of nodes with a recent heartbeat.
  uint64 online_node_count = 4;
  reserved 5, 6, 7;
}

// ReloadControllerConfigRequest requests an in-process controller config reload.
message ReloadControllerConfigRequest {}

// ReloadControllerConfigResponse confirms that the reload was accepted.
message ReloadControllerConfigResponse {
  // accepted is true when the current config passed reload validation and was scheduled.
  bool accepted = 1;
}

// GetCurrentConfigRequest requests the active redacted controller config.
message GetCurrentConfigRequest {}

// GetCurrentConfigResponse contains redacted config summaries only.
message GetCurrentConfigResponse {
  // listen_addr is the controller listen address.
  string listen_addr = 1;
  // git is the configured Git sync summary for the controller repo.
  GitConfigSummary git = 2;
  // nodes lists configured execution nodes.
  repeated NodeConfigSummary nodes = 3;
  // access_tokens lists token metadata without returning secret token values.
  repeated AccessTokenSummary access_tokens = 4;
  // dns describes optional DNS integration configuration.
  DNSConfigSummary dns = 5;
  // backup describes optional backup integration configuration.
  BackupConfigSummary backup = 6;
  // secrets describes the active secrets provider configuration.
  SecretsConfigSummary secrets = 7;
}

// GetCapabilitiesRequest requests global controller-backed feature availability.
message GetCapabilitiesRequest {}

// GetCapabilitiesResponse returns global feature availability for the web UI.
message GetCapabilitiesResponse {
  GlobalCapabilities global = 1;
}

// Capability describes whether a feature or action may currently be used.
message Capability {
  bool enabled = 1;
  // reason_code explains why the capability is disabled when enabled is false.
  CapabilityReasonCode reason_code = 2;
}

// CapabilityReasonCode explains why a capability is disabled.
enum CapabilityReasonCode {
  CAPABILITY_REASON_CODE_UNSPECIFIED = 0;
  CAPABILITY_REASON_CODE_MISSING_BACKUP_INTEGRATION = 1;
  CAPABILITY_REASON_CODE_MISSING_BACKUP_DEFINITION = 2;
  CAPABILITY_REASON_CODE_MISSING_RESTORE_DEFINITION = 3;
  CAPABILITY_REASON_CODE_MISSING_MIGRATE_DEFINITION = 4;
  CAPABILITY_REASON_CODE_MISSING_DNS_INTEGRATION = 5;
  CAPABILITY_REASON_CODE_MISSING_SECRETS_CONFIG = 6;
  CAPABILITY_REASON_CODE_MISSING_CADDY_INFRA = 7;
  CAPABILITY_REASON_CODE_MISSING_SERVICE_META = 8;
  CAPABILITY_REASON_CODE_SERVICE_NOT_DECLARED = 9;
  CAPABILITY_REASON_CODE_SERVICE_DNS_NOT_DECLARED = 10;
  CAPABILITY_REASON_CODE_SERVICE_NOT_CADDY_MANAGED = 11;
  CAPABILITY_REASON_CODE_NODE_DISABLED = 12;
  CAPABILITY_REASON_CODE_NODE_OFFLINE = 13;
  CAPABILITY_REASON_CODE_NODE_NOT_ELIGIBLE = 14;
  CAPABILITY_REASON_CODE_NODE_NOT_RUSTIC_MANAGED = 15;
  CAPABILITY_REASON_CODE_MISSING_ELIGIBLE_RUSTIC_NODE = 16;
  CAPABILITY_REASON_CODE_MISSING_ONLINE_RUSTIC_NODE = 17;
  CAPABILITY_REASON_CODE_BACKUP_NOT_SUCCEEDED = 18;
  CAPABILITY_REASON_CODE_BACKUP_ARTIFACT_MISSING = 19;
  CAPABILITY_REASON_CODE_MISSING_RESTORE_TARGET_NODE = 20;
}

// GlobalCapabilities describes controller-wide feature availability.
message GlobalCapabilities {
  Capability backup = 1;
  Capability dns = 2;
  Capability secrets = 3;
  Capability rustic_maintenance = 4;
}

// GitConfigSummary describes controller Git sync settings without credentials.
message GitConfigSummary {
  // remote_url is the configured Git remote URL.
  string remote_url = 1;
  // branch is the tracked Git branch name.
  string branch = 2;
  // pull_interval stores the configured pull interval duration string.
  string pull_interval = 3;
  // has_auth reports whether Git auth is configured, not the auth value itself.
  bool has_auth = 4;
  // author_name is the Git author name for controller-created commits.
  string author_name = 5;
  // author_email is the Git author email for controller-created commits.
  string author_email = 6;
}

// NodeConfigSummary describes one configured node entry.
message NodeConfigSummary {
  // id is the stable node identifier used across controller and agents.
  string id = 1;
  // display_name is the human-readable node label.
  string display_name = 2;
  // enabled reports whether the node is eligible for controller actions.
  bool enabled = 3;
  // public_ipv4 is empty when no public IPv4 address is configured.
  string public_ipv4 = 4;
  // public_ipv6 is empty when no public IPv6 address is configured.
  string public_ipv6 = 5;
}

// AccessTokenSummary describes one controller access token without exposing the token string.
message AccessTokenSummary {
  // name is the operator-facing token name.
  string name = 1;
  // enabled reports whether this token may be used.
  bool enabled = 2;
  // comment is the optional operator note attached to the token.
  string comment = 3;
}

// DNSConfigSummary describes optional DNS integration state.
message DNSConfigSummary {
  // has_cloudflare reports whether Cloudflare DNS integration is configured.
  bool has_cloudflare = 1;
}

// BackupConfigSummary describes optional backup integration state.
message BackupConfigSummary {
  // has_rustic reports whether Rustic backup integration is configured.
  bool has_rustic = 1;
}

// SecretsConfigSummary describes the active secrets provider setup.
message SecretsConfigSummary {
  // provider is the configured secrets provider name.
  string provider = 1;
  // has_identity reports whether an identity source is configured.
  bool has_identity = 2;
  // has_recipient reports whether a recipient source is configured.
  bool has_recipient = 3;
}
