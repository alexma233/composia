syntax = "proto3";

package composia.controller.v1;

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

service SecretService {
  rpc GetServiceSecretEnv(GetServiceSecretEnvRequest) returns (GetServiceSecretEnvResponse);
  rpc UpdateServiceSecretEnv(UpdateServiceSecretEnvRequest) returns (UpdateServiceSecretEnvResponse);
}

message GetServiceSecretEnvRequest {
  string service_name = 1;
}

message GetServiceSecretEnvResponse {
  string service_name = 1;
  string content = 2;
}

message UpdateServiceSecretEnvRequest {
  string service_name = 1;
  string content = 2;
  string base_revision = 3;
  string commit_message = 4;
}

message UpdateServiceSecretEnvResponse {
  string commit_id = 1;
}
