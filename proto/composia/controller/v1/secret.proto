syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/repo.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

// SecretService reads and updates encrypted secret files stored in the repo.
service SecretService {
  // GetSecret returns the decrypted content for one service secret file.
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  // UpdateSecret writes one secret file and reports the resulting repo sync state.
  rpc UpdateSecret(UpdateSecretRequest) returns (RepoWriteResult);
}

// GetSecretRequest identifies one decrypted secret file for a service.
message GetSecretRequest {
  string service_name = 1;
  string file_path = 2;
}

// GetSecretResponse returns one decrypted secret file.
message GetSecretResponse {
  string service_name = 1;
  string file_path = 2;
  string content = 3;
}

// UpdateSecretRequest writes one decrypted secret file for a service.
message UpdateSecretRequest {
  string service_name = 1;
  // file_path is the repo-relative secret file path for the service.
  string file_path = 2;
  // content is the full decrypted secret file content to store.
  string content = 3;
  // base_revision protects against writing on top of an unexpected HEAD.
  string base_revision = 4;
  // commit_message is used for the generated Git commit.
  string commit_message = 5;
}
