syntax = "proto3";

package composia.controller.v1;

import "proto/composia/controller/v1/task.proto";

option go_package = "forgejo.alexma.top/alexma233/composia/gen/go/proto/composia/controller/v1;controllerv1";

// ContainerService exposes container-level control and inspection entrypoints.
service ContainerService {
  // RunContainerAction starts an async action for one container on one node.
  rpc RunContainerAction(RunContainerActionRequest) returns (TaskActionResponse);
  // RemoveContainer starts an async deletion for one container on one node.
  rpc RemoveContainer(RemoveContainerRequest) returns (TaskActionResponse);
  // GetContainerLogs streams log text for one container.
  rpc GetContainerLogs(GetContainerLogsRequest) returns (stream GetContainerLogsResponse);
  // OpenContainerExec opens an interactive exec session for one container.
  rpc OpenContainerExec(OpenContainerExecRequest) returns (OpenContainerExecResponse);
  // RunContainerExec runs a non-interactive exec command and returns collected output.
  rpc RunContainerExec(RunContainerExecRequest) returns (RunContainerExecResponse);
  // RemoveNetwork starts an async deletion for one network on one node.
  rpc RemoveNetwork(RemoveNetworkRequest) returns (TaskActionResponse);
  // RemoveVolume starts an async deletion for one volume on one node.
  rpc RemoveVolume(RemoveVolumeRequest) returns (TaskActionResponse);
  // RemoveImage starts an async deletion for one image on one node.
  rpc RemoveImage(RemoveImageRequest) returns (TaskActionResponse);
}

// ContainerAction identifies a container lifecycle action.
enum ContainerAction {
  // CONTAINER_ACTION_UNSPECIFIED is invalid and should not be used.
  CONTAINER_ACTION_UNSPECIFIED = 0;
  // CONTAINER_ACTION_START starts the container.
  CONTAINER_ACTION_START = 1;
  // CONTAINER_ACTION_STOP stops the container.
  CONTAINER_ACTION_STOP = 2;
  // CONTAINER_ACTION_RESTART restarts the container.
  CONTAINER_ACTION_RESTART = 3;
}

// RunContainerActionRequest identifies one node-scoped container action.
message RunContainerActionRequest {
  string node_id = 1;
  string container_id = 2;
  ContainerAction action = 3;
}

// RemoveContainerRequest identifies one node-scoped container deletion.
message RemoveContainerRequest {
  string node_id = 1;
  string container_id = 2;
  bool force = 3;
  bool remove_volumes = 4;
}

// GetContainerLogsRequest fetches logs for one container.
message GetContainerLogsRequest {
  string node_id = 1;
  string container_id = 2;
  // tail is forwarded to the Docker log tail option.
  string tail = 3;
  // timestamps includes Docker timestamps in the returned log output.
  bool timestamps = 4;
}

// GetContainerLogsResponse returns one streamed log chunk.
message GetContainerLogsResponse {
  string content = 1;
}

// OpenContainerExecRequest starts an interactive exec session.
message OpenContainerExecRequest {
  string node_id = 1;
  string container_id = 2;
  // command stores the exec command and arguments.
  repeated string command = 3;
  // rows is the initial terminal row count.
  uint32 rows = 4;
  // cols is the initial terminal column count.
  uint32 cols = 5;
}

// OpenContainerExecResponse returns the session identity and websocket path.
message OpenContainerExecResponse {
  // session_id identifies the created interactive exec session.
  string session_id = 1;
  // websocket_path is the controller websocket path for the interactive tunnel.
  string websocket_path = 2;
}

// RunContainerExecRequest runs a non-interactive command in one container.
message RunContainerExecRequest {
  string node_id = 1;
  string container_id = 2;
  // command stores the exec command and arguments.
  repeated string command = 3;
  // stdin carries optional bytes written before stdin is closed.
  bytes stdin = 4;
  // timeout_seconds bounds command runtime on the agent.
  uint32 timeout_seconds = 5;
  // max_output_bytes limits each stdout/stderr stream; zero uses the agent default.
  uint64 max_output_bytes = 6;
}

// RunContainerExecResponse returns the completed exec result.
message RunContainerExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  bool timed_out = 4;
  bool stdout_truncated = 5;
  bool stderr_truncated = 6;
  string started_at = 7;
  string finished_at = 8;
  string duration = 9;
}

// RemoveNetworkRequest identifies one node-scoped network deletion.
message RemoveNetworkRequest {
  string node_id = 1;
  string network_id = 2;
}

// RemoveVolumeRequest identifies one node-scoped volume deletion.
message RemoveVolumeRequest {
  string node_id = 1;
  string volume_name = 2;
}

// RemoveImageRequest identifies one node-scoped image deletion.
message RemoveImageRequest {
  string node_id = 1;
  string image_id = 2;
  bool force = 3;
}
