services:
  controller-dev:
    build:
      context: ..
      target: dev
    working_dir: /workspace
    environment:
      GIT_CONFIG_COUNT: "2"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /data/repo-controller
      GIT_CONFIG_KEY_1: safe.directory
      GIT_CONFIG_VALUE_1: /workspace
    command:
      - sh
      - -c
      - |
        mkdir -p /data/repo-controller /data/state-controller /data/logs
        if [ ! -d /data/repo-controller/.git ]; then
          git init -q /data/repo-controller
        fi
        /go/bin/air -c ./dev/air.controller.toml
    ports:
      - "7001:7001"
    volumes:
      - ${DEV_WORKSPACE_DIR}:/workspace
      - ./repo-controller:/data/repo-controller
      - ./state-controller:/data/state-controller
      - ./logs:/data/logs
      - ${DEV_GO_MOD_CACHE_DIR}:/go/pkg/mod
      - ${DEV_GO_BUILD_CACHE_DIR}:/root/.cache/go-build
    networks:
      - composia-dev

  agent-dev:
    build:
      context: ..
      target: dev
    depends_on:
      controller-dev:
        condition: service_started
    working_dir: /workspace
    environment:
      GIT_CONFIG_COUNT: "2"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /data/repo-agent
      GIT_CONFIG_KEY_1: safe.directory
      GIT_CONFIG_VALUE_1: /workspace
    command:
      - sh
      - -c
      - |
        mkdir -p /data/repo-agent /data/state-agent
        /go/bin/air -c ./dev/air.agent.toml
    volumes:
      - ${DEV_WORKSPACE_DIR}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ./repo-agent:/data/repo-agent
      - ./state-agent:/data/state-agent
      - ${DEV_GO_MOD_CACHE_DIR}:/go/pkg/mod
      - ${DEV_GO_BUILD_CACHE_DIR}:/root/.cache/go-build
    networks:
      - composia-dev

  web-dev:
    image: oven/bun:1.3.14
    user: "${UID}:${GID}"
    depends_on:
      controller-dev:
        condition: service_started
    working_dir: /workspace
    command:
      - sh
      - -lc
      - bun install && bun run web:dev -- --host 0.0.0.0 --port 5173
    env_file:
      - ./.env
    ports:
      - "5173:5173"
    volumes:
      - ${DEV_WORKSPACE_DIR}:/workspace
      - ${DEV_BUN_CACHE_DIR}:/root/.bun/install/cache
      - ${DEV_ROOT_NODE_MODULES_DIR}:/workspace/node_modules
      - ${DEV_WEB_NODE_MODULES_DIR}:/workspace/web/node_modules
    networks:
      - composia-dev

  docs-dev:
    image: oven/bun:1.3.14
    user: "${UID}:${GID}"
    profiles:
      - docs
    working_dir: /workspace
    command:
      - sh
      - -lc
      - bun install && bun run docs:dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    volumes:
      - ${DEV_WORKSPACE_DIR}:/workspace
      - ${DEV_BUN_CACHE_DIR}:/root/.bun/install/cache
      - ${DEV_ROOT_NODE_MODULES_DIR}:/workspace/node_modules
      - ${DEV_WEB_NODE_MODULES_DIR}:/workspace/web/node_modules
    networks:
      - composia-dev

networks:
  composia-dev:
    name: composia-dev
