services:
  controller-dev:
    build:
      context: ..
      target: controller
    entrypoint:
      - sh
      - -eu
      - -c
    command:
      - |
        mkdir -p /tmp/repo-controller /tmp/state-controller /tmp/logs
        if [ ! -d /tmp/repo-controller/.git ]; then
          git init /tmp/repo-controller
        fi
        cat > /tmp/composia-e2e.yaml <<'EOF'
        controller:
          listen_addr: ":7001"
          repo_dir: "/tmp/repo-controller"
          state_dir: "/tmp/state-controller"
          log_dir: "/tmp/logs"
          access_tokens:
            - name: "web"
              token: "dev-admin-token"
              enabled: true
          nodes:
            - id: "main"
              display_name: "Main"
              enabled: true
              token: "main-agent-token"
        agent:
          controller_addr: "http://controller-dev:7001"
          node_id: "main"
          token: "main-agent-token"
          repo_dir: "/tmp/repo-agent"
          state_dir: "/tmp/state-agent"
        EOF
        exec /sbin/tini -- /usr/local/bin/composia-controller -config /tmp/composia-e2e.yaml
    ports:
      - "7001:7001"
    networks:
      - composia-e2e

  agent-dev:
    build:
      context: ..
      target: agent
    depends_on:
      controller-dev:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://host.docker.internal:2375
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - sh
      - -eu
      - -c
    command:
      - |
        mkdir -p /tmp/repo-agent /tmp/state-agent
        cat > /tmp/composia-e2e.yaml <<'EOF'
        controller:
          listen_addr: ":7001"
          repo_dir: "/tmp/repo-controller"
          state_dir: "/tmp/state-controller"
          log_dir: "/tmp/logs"
          access_tokens:
            - name: "web"
              token: "dev-admin-token"
              enabled: true
          nodes:
            - id: "main"
              display_name: "Main"
              enabled: true
              token: "main-agent-token"
        agent:
          controller_addr: "http://controller-dev:7001"
          node_id: "main"
          token: "main-agent-token"
          repo_dir: "/tmp/repo-agent"
          state_dir: "/tmp/state-agent"
        EOF
        exec /sbin/tini -- /usr/local/bin/composia-agent -config /tmp/composia-e2e.yaml
    networks:
      - composia-e2e

networks:
  composia-e2e:
