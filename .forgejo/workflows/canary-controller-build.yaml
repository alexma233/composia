name: Canary Controller Build

on:
  push:
    branches: ["main"]
    paths:
      - "cmd/composia-controller/**"
      - "internal/app/controller/**"
      - "internal/core/**"
      - "internal/platform/rpcutil/**"
      - "internal/platform/secret/**"
      - "internal/platform/store/**"
      - "internal/version/**"
      - "proto/composia/agent/**"
      - "proto/composia/controller/**"
      - "gen/go/proto/composia/agent/**"
      - "gen/go/proto/composia/controller/**"
      - "go.mod"
      - "go.sum"
      - "scripts/build/canary-binary.sh"
      - "Dockerfile"
      - ".dockerignore"
      - ".forgejo/workflows/canary-controller-build.yaml"
      - ".forgejo/workflows/reusable-docker-publish.yaml"
      - ".forgejo/workflows/release-build.yaml"
  workflow_dispatch:

env:
  OUTPUT_DIR: dist/canary-controller

jobs:
  docker-controller:
    runs-on: docker-amd64-dind
    uses: ./.forgejo/workflows/reusable-docker-publish.yaml
    secrets: inherit
    with:
      dockerfile: ./Dockerfile
      target: controller
      platforms: linux/amd64,linux/arm64
      images: |
        forgejo.alexma.top/${{ github.repository_owner }}/composia-controller
        ghcr.io/${{ github.repository_owner }}/composia-controller
      tags: |
        type=raw,value=canary-{{sha}},enable=true
        type=raw,value=canary,enable=true
      labels: |
        org.opencontainers.image.description=Composia controller runtime image
        org.opencontainers.image.documentation=https://docs.composia.xyz
        org.opencontainers.image.vendor=${{ github.repository_owner }}
        org.opencontainers.image.ref.name=canary
        org.opencontainers.image.version=canary-{{sha}}
        io.composia.channel=canary
        io.composia.image=controller
      cache_ref: forgejo.alexma.top/${{ github.repository_owner }}/composia-controller:buildcache

  binary-controller:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.2
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Build canary binary
        env:
          BINARY_NAME: composia-controller
          PACKAGE: ./cmd/composia-controller
          VERSION: canary-${{ github.sha }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: sh ./scripts/build/canary-binary.sh

      - name: Upload canary binary
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-controller-canary-linux-${{ matrix.goarch }}
          path: ${{ env.OUTPUT_DIR }}/composia-controller
