name: Canary Controller Build

on:
  push:
    branches: ["main"]
    paths:
      - "cmd/composia-controller/**"
      - "internal/app/controller/**"
      - "internal/core/**"
      - "internal/platform/rpcutil/**"
      - "internal/platform/secret/**"
      - "internal/platform/store/**"
      - "internal/version/**"
      - "proto/composia/agent/**"
      - "proto/composia/controller/**"
      - "gen/go/proto/composia/agent/**"
      - "gen/go/proto/composia/controller/**"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"
      - "Dockerfile.goreleaser"
      - ".dockerignore"
      - ".forgejo/workflows/canary-controller-build.yaml"
      - ".forgejo/workflows/release-build.yaml"
  workflow_dispatch:

env:
  COMPOSIA_CANARY_TARGET: controller

jobs:
  binary-controller:
    runs-on: docker-amd64-dind
    container:
      image: forgejo.alexma.top/alexma233/ci-image-go-releaser:2.15.4
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        # renovate: datasource=git-refs depName=actions/docker-setup-buildx-action packageName=https://forgejo.alexma.top/actions/docker-setup-buildx-action currentValue=v4.0.0
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Forgejo Registry
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: forgejo.alexma.top
          username: ${{ secrets.OCI_IMAGES_FORGEJO_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_FORGEJO_TOKEN }}

      - name: Login to GHCR
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ secrets.OCI_IMAGES_GHCR_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_GHCR_TOKEN }}

      - name: Build and publish canary artifacts
        env:
          GORELEASER_CURRENT_TAG: v0.0.0-canary-${{ github.sha }}
        run: goreleaser release --clean --skip=announce,validate,archive,nfpm,aur,aur-source,sbom,publish --timeout=10m

      - name: Upload canary binary
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-controller-canary-${{ github.sha }}
          path: dist/composia-controller-*/*

      - name: Upload canary checksums
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-controller-canary-checksums-${{ github.sha }}
          path: dist/checksums.txt
