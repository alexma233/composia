name: Backend CI

env:
  GOLANGCI_LINT_VERSION: v2.11.4

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/app/**"
      - "internal/core/**"
      - "internal/platform/**"
      - "internal/version/**"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "gen/go/**"
      - "scripts/build/**"
      - ".goreleaser.yaml"
      - "flake.nix"
      - "flake.lock"
      - ".golangci.yml"
      - ".forgejo/workflows/backend-ci.yaml"
      - ".forgejo/workflows/canary-agent-build.yaml"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/canary-controller-build.yaml"
  push:
    branches: ["main"]
    paths:
      - "cmd/**"
      - "internal/app/**"
      - "internal/core/**"
      - "internal/platform/**"
      - "internal/version/**"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "gen/go/**"
      - "scripts/build/**"
      - ".goreleaser.yaml"
      - ".golangci.yml"
      - "flake.nix"
      - "flake.lock"
      - ".forgejo/workflows/backend-ci.yaml"
      - ".forgejo/workflows/canary-agent-build.yaml"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/canary-controller-build.yaml"
  workflow_dispatch:

jobs:
  gofmt:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.4

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check Go formatting
        run: |
          unformatted="$(git ls-files '*.go' | xargs -r gofmt -l)"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi

  build-test:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.4

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build backend
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run backend tests
        run: CGO_ENABLED=1 go test -race -coverprofile=coverage.out ./...

      - name: Check test coverage
        run: |
          go tool cover -func=coverage.out | tail -1
          coverage=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"

  golangci-lint:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.4

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install golangci-lint
        run: |
          mkdir -p /tmp/golangci-lint-bin
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b /tmp/golangci-lint-bin ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run golangci-lint
        run: /tmp/golangci-lint-bin/golangci-lint run --timeout 5m

  govulncheck:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.4

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run govulncheck
        env:
          GOSUMDB: sum.golang.google.cn
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
