name: Backend CI

env:
  GOLANGCI_LINT_VERSION: v2.11.4

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/app/**"
      - "internal/core/**"
      - "internal/platform/**"
      - "internal/version/**"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "gen/go/**"
      - "scripts/build/**"
      - ".goreleaser.yaml"
      - "flake.nix"
      - "flake.lock"
      - ".forgejo/workflows/backend-ci.yaml"
      - ".forgejo/workflows/canary-agent-build.yaml"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/canary-controller-build.yaml"
  push:
    branches: ["main"]
    paths:
      - "cmd/**"
      - "internal/app/**"
      - "internal/core/**"
      - "internal/platform/**"
      - "internal/version/**"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "gen/go/**"
      - "scripts/build/**"
      - ".goreleaser.yaml"
      - "flake.nix"
      - "flake.lock"
      - ".forgejo/workflows/backend-ci.yaml"
      - ".forgejo/workflows/canary-agent-build.yaml"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/canary-controller-build.yaml"
  workflow_dispatch:

jobs:
  gofmt:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.2

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check Go formatting
        run: |
          unformatted="$(git ls-files '*.go' | xargs -r gofmt -l)"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi

  build-test:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.2

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Build backend
        run: go build ./...

      - name: Build release binaries
        run: sh ./scripts/build/binaries.sh

      - name: Run go vet
        run: go vet ./...

      - name: Run backend tests
        run: go test ./...

  golangci-lint:
    runs-on: docker-amd64
    continue-on-error: true
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.2

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install golangci-lint
        run: |
          mkdir -p /tmp/golangci-lint-bin
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b /tmp/golangci-lint-bin ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run golangci-lint
        run: /tmp/golangci-lint-bin/golangci-lint run
