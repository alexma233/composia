name: Backend CI

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/app/**"
      - "internal/core/**"
      - "internal/platform/**"
      - "internal/version/**"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "gen/go/**"
      - "web/src/lib/gen/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "scripts/dev/check-generated.sh"
      - "scripts/build/**"
      - ".goreleaser.yaml"
      - "flake.nix"
      - "flake.lock"
      - ".golangci.yml"
      - ".forgejo/workflows/backend-ci.yaml"
      - ".forgejo/workflows/canary-agent-build.yaml"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/canary-controller-build.yaml"
  push:
    branches: ["main"]
    paths:
      - "cmd/**"
      - "internal/app/**"
      - "internal/core/**"
      - "internal/platform/**"
      - "internal/version/**"
      - "go.mod"
      - "go.sum"
      - "proto/**"
      - "gen/go/**"
      - "web/src/lib/gen/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "scripts/dev/check-generated.sh"
      - "scripts/build/**"
      - ".goreleaser.yaml"
      - ".golangci.yml"
      - "flake.nix"
      - "flake.lock"
      - ".forgejo/workflows/backend-ci.yaml"
      - ".forgejo/workflows/canary-agent-build.yaml"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/canary-controller-build.yaml"
  workflow_dispatch:

jobs:
  gofmt:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.5@sha256:8615c36fb87436f38a0e06291b756e929a9bb8c16ce2a14f66f6cd94d7ebd25f

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check Go formatting
        run: |
          unformatted="$(git ls-files '*.go' | xargs -r gofmt -l)"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi

  generated-drift:
    runs-on: docker-amd64
    container:
      image: forgejo-registry-raw.alexma.top/alexma233/ci-images-go-node-docker-deno-chromium:1.26@sha256:144f7a12ff4d609bc721fdcc70ee2330efe20c2aea19510c753c23ad71738fe8

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check generated protobuf drift
        run: scripts/dev/check-generated.sh

  nix-build:
    runs-on: docker-amd64
    container:
      image: ghcr.io/joschi/forgejo-nix:latest@sha256:082480fa291ead6a19973ee3dc308a81e128cc3c1d82cd58a707e494d662febb

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build Nix package
        run: nix build .#composia --no-link

  build-test:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.5@sha256:8615c36fb87436f38a0e06291b756e929a9bb8c16ce2a14f66f6cd94d7ebd25f

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build backend
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run backend tests
        run: CGO_ENABLED=1 go test -race -coverprofile=coverage.out ./...

      - name: Check test coverage
        run: |
          go tool cover -func=coverage.out | tail -1
          coverage=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"

  golangci-lint:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node-lint:1.26@sha256:959391c9c7b2f72b50dc7de6c81ae9288afce0ffcd4f55a0f232a30b2653624f

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run golangci-lint
        run: golangci-lint run --timeout 20m

  govulncheck:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node-lint:1.26@sha256:959391c9c7b2f72b50dc7de6c81ae9288afce0ffcd4f55a0f232a30b2653624f

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run govulncheck
        env:
          GOSUMDB: sum.golang.google.cn
        run: govulncheck ./...
