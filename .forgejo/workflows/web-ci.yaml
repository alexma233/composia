name: Web CI

on:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "buf.gen.yaml"
      - "proto/**"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "bun.lock"
      - "buf.gen.yaml"
      - "proto/**"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  workflow_dispatch:

jobs:
  format:
    runs-on: docker-amd64
    container:
      image: oven/bun:1.3.14

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.3
        uses: https://forgejo.alexma.top/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Run web format checks
        run: bun run web:format

  build:
    runs-on: docker-amd64
    container:
      image: oven/bun:1.3.14

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.3
        uses: https://forgejo.alexma.top/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Run web type checks
        run: bun run web:check

      - name: Build web
        run: bun run web:build
