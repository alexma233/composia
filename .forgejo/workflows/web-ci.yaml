name: Web CI

on:
  pull_request:
    paths:
      - "package.json"
      - "deno.json"
      - "deno.lock"
      - "buf.gen.yaml"
      - "proto/**"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "deno.json"
      - "deno.lock"
      - "buf.gen.yaml"
      - "proto/**"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  workflow_dispatch:

jobs:
  format:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-deno:2.9.2@sha256:a3462e85354bb3c465f5c46f583a67a606c2499255b12fd094afc81e534578ee

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install web dependencies
        run: deno install --frozen

      - name: Run web format checks
        run: deno task web:format

  build:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-deno:2.9.2@sha256:a3462e85354bb3c465f5c46f583a67a606c2499255b12fd094afc81e534578ee

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install web dependencies
        run: deno install --frozen

      - name: Run web type checks
        run: deno task web:check

      - name: Run web unit tests
        run: deno task web:test

      - name: Build web and enforce bundle budgets
        run: deno task web:check:bundle
