name: Web CI

on:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "bun.lock"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  workflow_dispatch:

jobs:
  format:
    runs-on: docker-amd64
    container:
      image: oven/bun:1.3.13

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Run web format checks
        run: bun run web:format

  build:
    runs-on: docker-amd64
    container:
      image: oven/bun:1.3.13

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Run web type checks
        run: bun run web:check

      - name: Build web
        run: bun run web:build
