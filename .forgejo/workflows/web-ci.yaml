name: Web CI

on:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "buf.gen.yaml"
      - "proto/**"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "bun.lock"
      - "buf.gen.yaml"
      - "proto/**"
      - "web/**"
      - ".forgejo/workflows/web-ci.yaml"
  workflow_dispatch:

jobs:
  format:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-bun-wrangler:1.3.14

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Run web format checks
        run: bun run web:format

  build:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-bun-wrangler:1.3.14

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Run web type checks
        run: bun run web:check

      - name: Build web
        run: bun run web:build
