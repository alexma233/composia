name: Dev Docker Build

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "bun.lock"
      - "web/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".forgejo/workflows/dev-build-docker.yaml"
      - ".forgejo/workflows/release-build-docker.yaml"
  workflow_dispatch:

env:
  REGISTRY_HOST: forgejo.alexma.top
  FORGEJO_BACKEND_IMAGE_NAME: forgejo.alexma.top/${{ github.repository }}
  FORGEJO_WEB_IMAGE_NAME: forgejo.alexma.top/${{ github.repository_owner }}/composia-web
  GHCR_BACKEND_IMAGE_NAME: ghcr.io/${{ github.repository }}
  GHCR_WEB_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/composia-web
  PLATFORMS: linux/amd64

jobs:
  docker-backend:
    runs-on: docker-amd64-dind
    steps:
      - name: Checkout
        uses: https://forgejo.alexma.top/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        shell: bash
        run: |
          set -eu

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"

          if [ -z "$base_sha" ] || [ "$base_sha" = "$zero_sha" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          if printf '%s\n' "$changed_files" | grep -Eq '^(.*\.go|go\.mod|go\.sum|Dockerfile|\.dockerignore|proto/.*|gen/go/.*|\.forgejo/workflows/dev-build-docker\.yaml|\.forgejo/workflows/release-build-docker\.yaml)$'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_build == 'true'
        id: buildx
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@v3

      - name: Login to Forgejo Registry
        if: steps.changes.outputs.should_build == 'true'
        uses: https://forgejo.alexma.top/actions/docker-login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to GHCR
        if: steps.changes.outputs.should_build == 'true'
        uses: https://forgejo.alexma.top/actions/docker-login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker meta
        if: steps.changes.outputs.should_build == 'true'
        id: meta
        uses: https://forgejo.alexma.top/actions/docker-metadata-action@v5
        with:
          images: |
            ${{ env.FORGEJO_BACKEND_IMAGE_NAME }}
            ${{ env.GHCR_BACKEND_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=canary-{{sha}},enable=true
            type=raw,value=canary,enable=true
          labels: |
            org.opencontainers.image.description=Composia controller runtime image
            org.opencontainers.image.documentation=https://docs.composia.xyz
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.ref.name=canary
            org.opencontainers.image.version=canary-{{sha}}
            io.composia.channel=canary

      - name: Build and push
        if: steps.changes.outputs.should_build == 'true'
        uses: https://forgejo.alexma.top/actions/docker-build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.FORGEJO_BACKEND_IMAGE_NAME }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.FORGEJO_BACKEND_IMAGE_NAME }}:buildcache,mode=max

  docker-web:
    runs-on: docker-amd64-dind
    steps:
      - name: Checkout
        uses: https://forgejo.alexma.top/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect web changes
        id: changes
        shell: bash
        run: |
          set -eu

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"

          if [ -z "$base_sha" ] || [ "$base_sha" = "$zero_sha" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          if printf '%s\n' "$changed_files" | grep -Eq '^(package\.json|bun\.lock|web/.*|web/Dockerfile|\.forgejo/workflows/dev-build-docker\.yaml|\.forgejo/workflows/release-build-docker\.yaml)$'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_build == 'true'
        id: buildx
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@v3

      - name: Login to Forgejo Registry
        if: steps.changes.outputs.should_build == 'true'
        uses: https://forgejo.alexma.top/actions/docker-login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to GHCR
        if: steps.changes.outputs.should_build == 'true'
        uses: https://forgejo.alexma.top/actions/docker-login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker meta
        if: steps.changes.outputs.should_build == 'true'
        id: meta
        uses: https://forgejo.alexma.top/actions/docker-metadata-action@v5
        with:
          images: |
            ${{ env.FORGEJO_WEB_IMAGE_NAME }}
            ${{ env.GHCR_WEB_IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=canary-{{sha}},enable=true
            type=raw,value=canary,enable=true
          labels: |
            org.opencontainers.image.description=Composia web interface image
            org.opencontainers.image.documentation=https://docs.composia.xyz
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.ref.name=canary
            org.opencontainers.image.version=canary-{{sha}}
            io.composia.channel=canary

      - name: Build and push
        if: steps.changes.outputs.should_build == 'true'
        uses: https://forgejo.alexma.top/actions/docker-build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.FORGEJO_WEB_IMAGE_NAME }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.FORGEJO_WEB_IMAGE_NAME }}:buildcache,mode=max
