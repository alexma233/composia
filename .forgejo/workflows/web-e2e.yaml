name: Web E2E

on:
  pull_request:
    paths:
      - "package.json"
      - "deno.json"
      - "deno.lock"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "proto/**"
      - "gen/go/**"
      - "web/**"
      - "Dockerfile"
      - ".dockerignore"
      - "dev/docker-compose.e2e.yaml"
      - ".forgejo/workflows/web-e2e.yaml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "deno.json"
      - "deno.lock"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "proto/**"
      - "gen/go/**"
      - "web/**"
      - "Dockerfile"
      - ".dockerignore"
      - "dev/docker-compose.e2e.yaml"
      - ".forgejo/workflows/web-e2e.yaml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: docker-amd64-dind
    container:
      image: forgejo-registry-raw.alexma.top/alexma233/ci-images-go-node-docker-deno-chromium:1.26@sha256:144f7a12ff4d609bc721fdcc70ee2330efe20c2aea19510c753c23ad71738fe8

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify Docker access
        run: |
          docker version
          docker compose version

      - name: Run web e2e
        run: |
          COMPOSE_PROJECT_NAME="composia-e2e-${GITHUB_RUN_ID:-$$}" \
          COMPOSIA_E2E_CONTROLLER_PORT=0 \
          COMPOSIA_E2E_CONTROLLER_HOST=dind \
          sh scripts/dev/e2e.sh web
