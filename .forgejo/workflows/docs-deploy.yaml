name: Build and Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".forgejo/workflows/docs-deploy.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images:bun-wrangler

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v5.0.1
        uses: https://forgejo.alexma.top/actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        # renovate: datasource=git-refs depName=actions/cloudflare-wrangler-action packageName=https://forgejo.alexma.top/actions/cloudflare-wrangler-action currentValue=v3.15.0
        uses: https://forgejo.alexma.top/actions/cloudflare-wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Cloudflare uses the branch name to decide if a deploy is production or preview.
          # Use the project's production branch (main) so the deployment is marked as Production.
          command: pages deploy ./docs/.vitepress/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main
