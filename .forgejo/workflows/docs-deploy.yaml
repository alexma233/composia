name: Build and Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".forgejo/workflows/docs-deploy.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images:bun-wrangler

    steps:
      - name: Checkout
        uses: https://forgejo.alexma.top/actions/checkout@v5

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: https://forgejo.alexma.top/actions/cloudflare-wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Cloudflare uses the branch name to decide if a deploy is production or preview.
          # Use the project's production branch (main) so the deployment is marked as Production.
          command: pages deploy ./docs/.vitepress/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main
