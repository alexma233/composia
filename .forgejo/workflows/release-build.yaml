name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  binary-packages:
    runs-on: docker-amd64-dind
    container:
      image: forgejo.alexma.top/alexma233/ci-image-go-releaser:2.16.0
    env:
      PATH: /usr/local/go/bin:/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.3
        uses: https://forgejo.alexma.top/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        # renovate: datasource=git-refs depName=actions/docker-setup-buildx-action packageName=https://forgejo.alexma.top/actions/docker-setup-buildx-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to Forgejo Registry
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.2.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: forgejo.alexma.top
          username: ${{ secrets.OCI_IMAGES_FORGEJO_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_FORGEJO_TOKEN }}

      - name: Login to GHCR
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.2.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ secrets.OCI_IMAGES_GHCR_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_GHCR_TOKEN }}

      - name: Login to Docker Hub
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.2.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.OCI_IMAGES_DOCKERHUB_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_DOCKERHUB_TOKEN }}

      - name: Build and publish release artifacts
        env:
          GITEA_TOKEN: ${{ forgejo.token }}
          GORELEASER_FORCE_TOKEN: gitea
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: goreleaser release --clean --timeout=40m

      - name: Publish Debian packages to Forgejo APT registry
        continue-on-error: true
        env:
          DEBIAN_PACKAGE_USERNAME: ${{ secrets.DEBIAN_PACKAGE_USERNAME }}
          DEBIAN_PACKAGE_TOKEN: ${{ secrets.DEBIAN_PACKAGE_TOKEN }}
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl

          set -- dist/*.deb
          if [ ! -e "$1" ]; then
            printf 'No Debian packages found, skipping APT registry upload.\n'
            exit 0
          fi

          for deb in dist/*.deb; do
            status="$(curl --silent --show-error --output /tmp/forgejo-apt-upload-response --write-out '%{http_code}' \
              --user "${DEBIAN_PACKAGE_USERNAME}:${DEBIAN_PACKAGE_TOKEN}" \
              --upload-file "${deb}" \
              "https://forgejo.alexma.top/api/packages/alexma233/debian/pool/stable/main/upload" || true)"

            case "${status}" in
              2*)
                printf 'Published %s to Forgejo APT registry.\n' "${deb}"
                ;;
              409)
                printf 'Skipping %s because this package already exists in the Forgejo APT registry.\n' "${deb}"
                ;;
              *)
                printf 'Warning: failed to publish %s to Forgejo APT registry (HTTP %s).\n' "${deb}" "${status}"
                cat /tmp/forgejo-apt-upload-response
                printf '\n'
                ;;
            esac
          done

      - name: Install COPR build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends rpm python3-pip
          pip3 install --break-system-packages copr-cli rich

      - name: Build and publish COPR SRPM
        env:
          COPR_CLI_CONFIG: ${{ secrets.COPR_CLI_CONFIG }}
        run: |
          mkdir -p ~/.config
          printf '%s' "$COPR_CLI_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr
          scripts/build/copr-srpm.sh
          copr-cli build composia \
            --nowait \
            dist/copr-rpmbuild/SRPMS/*.src.rpm

  docker-web:
    uses: ./.forgejo/workflows/reusable-docker-publish.yaml
    secrets: inherit
    with:
      dockerfile: ./web/Dockerfile
      target: final
      platforms: linux/amd64,linux/arm64
      images: |
        forgejo.alexma.top/alexma233/composia-web
        ghcr.io/alexma233/composia-web
        alexma233/composia-web
      tags: |
        type=semver,pattern={{version}},enable=true
        type=semver,pattern={{major}}.{{minor}},enable=true
        type=semver,pattern={{major}},enable=true
      labels: |
        org.opencontainers.image.description=Composia web interface image
        org.opencontainers.image.documentation=https://composia.xyz
        org.opencontainers.image.vendor=alexma233
        org.opencontainers.image.ref.name=${{ github.ref_name }}
      cache_ref: forgejo.alexma.top/alexma233/composia-web:buildcache
      latest: true
      login_dockerhub: true
