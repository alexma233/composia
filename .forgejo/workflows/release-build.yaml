name: Release Build

on:
  push:
    tags:
      - "v*"

env:
  GORELEASER_VERSION: v2.15.0
  REGISTRY_HOST: forgejo.alexma.top
  WEB_PLATFORMS: linux/amd64,linux/arm64
  BACKEND_PLATFORMS: linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/riscv64

jobs:
  binary-packages:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node:1.26.2
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@${{ env.GORELEASER_VERSION }}

      - name: Build and publish binary packages
        env:
          GITEA_TOKEN: ${{ secrets.FORGEJO_RELEASE_TOKEN }}
        run: goreleaser release --clean

  docker-backend:
    runs-on: docker-amd64-dind
    strategy:
      matrix:
        include:
          - target: cli
            description: Composia CLI image
            forgejo_image: forgejo.alexma.top/${{ github.repository_owner }}/composia-cli
            ghcr_image: ghcr.io/${{ github.repository_owner }}/composia-cli
            codeberg_image: codeberg.org/alexma233/composia-cli
            dockerhub_image: alexma233/composia-cli
          - target: controller
            description: Composia controller runtime image
            forgejo_image: forgejo.alexma.top/${{ github.repository_owner }}/composia-controller
            ghcr_image: ghcr.io/${{ github.repository_owner }}/composia-controller
            codeberg_image: codeberg.org/alexma233/composia-controller
            dockerhub_image: alexma233/composia-controller
          - target: agent
            description: Composia agent runtime image
            forgejo_image: forgejo.alexma.top/${{ github.repository_owner }}/composia-agent
            ghcr_image: ghcr.io/${{ github.repository_owner }}/composia-agent
            codeberg_image: codeberg.org/alexma233/composia-agent
            dockerhub_image: alexma233/composia-agent
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        id: buildx
        # renovate: datasource=git-refs depName=actions/docker-setup-buildx-action packageName=https://forgejo.alexma.top/actions/docker-setup-buildx-action currentValue=v4.0.0
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Forgejo Registry
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.OCI_IMAGES_FORGEJO_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_FORGEJO_TOKEN }}

      - name: Login to GHCR
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ secrets.OCI_IMAGES_GHCR_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_GHCR_TOKEN }}

      - name: Login to Codeberg
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: codeberg.org
          username: ${{ secrets.OCI_IMAGES_CODEBERG_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_CODEBERG_TOKEN }}

      - name: Login to Docker Hub
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.OCI_IMAGES_DOCKERHUB_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        # renovate: datasource=git-refs depName=actions/docker-metadata-action packageName=https://forgejo.alexma.top/actions/docker-metadata-action currentValue=v6.0.0
        uses: https://forgejo.alexma.top/actions/docker-metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: |
            ${{ matrix.forgejo_image }}
            ${{ matrix.ghcr_image }}
            ${{ matrix.codeberg_image }}
            ${{ matrix.dockerhub_image }}
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},enable=true
            type=semver,pattern={{major}}.{{minor}},enable=true
            type=semver,pattern={{major}},enable=true
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.documentation=https://docs.composia.xyz
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            io.composia.image=${{ matrix.target }}

      - name: Build and push
        # renovate: datasource=git-refs depName=actions/docker-build-push-action packageName=https://forgejo.alexma.top/actions/docker-build-push-action currentValue=v7.1.0
        uses: https://forgejo.alexma.top/actions/docker-build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: ${{ env.BACKEND_PLATFORMS }}
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ matrix.forgejo_image }}:buildcache
          cache-to: |
            type=registry,ref=${{ matrix.forgejo_image }}:buildcache,mode=max

  docker-web:
    runs-on: docker-amd64-dind
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        id: buildx
        # renovate: datasource=git-refs depName=actions/docker-setup-buildx-action packageName=https://forgejo.alexma.top/actions/docker-setup-buildx-action currentValue=v4.0.0
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Forgejo Registry
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.OCI_IMAGES_FORGEJO_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_FORGEJO_TOKEN }}

      - name: Login to GHCR
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ secrets.OCI_IMAGES_GHCR_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_GHCR_TOKEN }}

      - name: Login to Codeberg
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: codeberg.org
          username: ${{ secrets.OCI_IMAGES_CODEBERG_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_CODEBERG_TOKEN }}

      - name: Login to Docker Hub
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.1.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.OCI_IMAGES_DOCKERHUB_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        # renovate: datasource=git-refs depName=actions/docker-metadata-action packageName=https://forgejo.alexma.top/actions/docker-metadata-action currentValue=v6.0.0
        uses: https://forgejo.alexma.top/actions/docker-metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: |
            forgejo.alexma.top/${{ github.repository_owner }}/composia-web
            ghcr.io/${{ github.repository_owner }}/composia-web
            codeberg.org/alexma233/composia-web
            alexma233/composia-web
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},enable=true
            type=semver,pattern={{major}}.{{minor}},enable=true
            type=semver,pattern={{major}},enable=true
          labels: |
            org.opencontainers.image.description=Composia web interface image
            org.opencontainers.image.documentation=https://docs.composia.xyz
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}

      - name: Build and push
        # renovate: datasource=git-refs depName=actions/docker-build-push-action packageName=https://forgejo.alexma.top/actions/docker-build-push-action currentValue=v7.1.0
        uses: https://forgejo.alexma.top/actions/docker-build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          platforms: ${{ env.WEB_PLATFORMS }}
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=forgejo.alexma.top/${{ github.repository_owner }}/composia-web:buildcache
          cache-to: |
            type=registry,ref=forgejo.alexma.top/${{ github.repository_owner }}/composia-web:buildcache,mode=max
