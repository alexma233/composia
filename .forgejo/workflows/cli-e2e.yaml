name: CLI E2E

on:
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "proto/**"
      - "gen/go/**"
      - "test/e2e/**"
      - "Dockerfile"
      - ".dockerignore"
      - "dev/docker-compose.e2e.yaml"
      - ".forgejo/workflows/cli-e2e.yaml"
  push:
    branches: ["main"]
    paths:
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "proto/**"
      - "gen/go/**"
      - "test/e2e/**"
      - "Dockerfile"
      - ".dockerignore"
      - "dev/docker-compose.e2e.yaml"
      - ".forgejo/workflows/cli-e2e.yaml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: docker-amd64-dind
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node-docker:1.26@sha256:2b6aa43692898ca9a10d719824e29e060de1059a12e713ea06cdab5232970daa

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify Docker access
        run: |
          docker version
          docker compose version

      - name: Run CLI e2e
        run: |
          COMPOSE_PROJECT_NAME="composia-e2e-${GITHUB_RUN_ID:-$$}" \
          COMPOSIA_E2E_CONTROLLER_PORT=0 \
          COMPOSIA_E2E_CONTROLLER_HOST=dind \
          sh scripts/dev/e2e.sh cli
