name: Canary CLI Build

on:
  push:
    branches: ["main"]
    paths:
      - "cmd/composia/**"
      - "internal/app/cli/**"
      - "internal/platform/rpcutil/**"
      - "internal/version/**"
      - "proto/composia/controller/**"
      - "gen/go/proto/composia/controller/**"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"
      - "Dockerfile.goreleaser"
      - ".dockerignore"
      - ".forgejo/workflows/canary-cli-build.yaml"
      - ".forgejo/workflows/release-build.yaml"
  workflow_dispatch:

env:
  COMPOSIA_CANARY_TARGET: cli

jobs:
  binary-cli:
    runs-on: docker-amd64-dind
    container:
      image: forgejo.alexma.top/alexma233/ci-image-go-releaser:2.16.0
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        # renovate: datasource=git-refs depName=actions/docker-setup-buildx-action packageName=https://forgejo.alexma.top/actions/docker-setup-buildx-action currentValue=v4.2.0
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to Forgejo Registry
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.4.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: forgejo.alexma.top
          username: ${{ secrets.OCI_IMAGES_FORGEJO_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_FORGEJO_TOKEN }}

      - name: Login to GHCR
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.4.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ secrets.OCI_IMAGES_GHCR_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_GHCR_TOKEN }}

      - name: Build and publish canary artifacts
        env:
          GORELEASER_CURRENT_TAG: v0.0.0-canary-${{ github.sha }}
        run: goreleaser release --clean --skip=before,announce,validate,archive,nfpm,aur,aur-source,sbom --timeout=40m

      - name: Set canary short SHA
        run: printf 'COMPOSIA_SHORT_SHA=%s\n' "$(git rev-parse --short=7 HEAD)" >> "$GITHUB_ENV"

      - name: Upload canary binary linux amd64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-linux-amd64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-linux_linux_amd64_v1/composia

      - name: Upload canary binary linux arm64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-linux-arm64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-linux_linux_arm64_v8.0/composia

      - name: Upload canary binary linux 386
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-linux-386-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-linux_linux_386_sse2/composia

      - name: Upload canary binary linux armv7
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-linux-armv7-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-linux_linux_arm_7/composia

      - name: Upload canary binary linux riscv64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-linux-riscv64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-linux_linux_riscv64_rva20u64/composia

      - name: Upload canary binary darwin amd64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-darwin-amd64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-darwin_darwin_amd64_v1/composia

      - name: Upload canary binary darwin arm64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-darwin-arm64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-darwin_darwin_arm64_v8.0/composia

      - name: Upload canary binary windows 386
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-windows-386-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-windows_windows_386_sse2/composia.exe

      - name: Upload canary binary windows amd64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-windows-amd64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-windows_windows_amd64_v1/composia.exe

      - name: Upload canary binary windows arm64
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-windows-arm64-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/composia-windows_windows_arm64_v8.0/composia.exe

      - name: Upload canary checksums
        uses: https://forgejo.alexma.top/actions/upload-artifact@v4
        with:
          name: composia-canary-checksums-${{ env.COMPOSIA_SHORT_SHA }}
          path: dist/checksums.txt
