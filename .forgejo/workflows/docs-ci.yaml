name: Docs CI

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/docs/**"
      - "proto/**"
      - ".forgejo/workflows/docs-ci.yaml"
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "scripts/docs/**"
      - "proto/**"
      - ".forgejo/workflows/docs-ci.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: docker-amd64
    container:
      image: oven/bun:1.3.13

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build
