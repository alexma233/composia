name: Website CI

on:
  pull_request:
    paths:
      - "site/**"
      - "scripts/docs/**"
      - "proto/**"
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "scripts/docs/**"
      - "proto/**"
      - ".forgejo/workflows/docs-ci.yaml"
  workflow_dispatch:

env:
  HUGO_ENVIRONMENT: production
  HUGO_ENV: production

jobs:
  check-api-docs:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-go-node-docs:1.26@sha256:d718fa1081055c752f9697359dfc6872cd9640e218c42c96206603043ced4726

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Generate API docs
        run: sh scripts/docs/generate-proto-docs.sh

      - name: Check API docs are in sync
        run: |
          if ! git diff --exit-code site/content/docs/developer-guide/api/; then
            printf '\nAPI docs are out of sync with proto files.\n'
            printf 'Run scripts/docs/generate-proto-docs.sh and commit the changes.\n'
            exit 1
          fi

  build-deploy:
    needs: check-api-docs
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-hugo-wrangler:0.164.0@sha256:9cc76062b8d75851a8d0aa2cc82bdd6a396615f22066946c815fe31490a7e1b8

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download Hugo modules
        working-directory: site
        run: |
          hugo mod tidy
          hugo mod verify

      - name: Build website
        working-directory: site
        run: |
          hugo --minify -d public

      - name: Deploy to Cloudflare Pages
        if: ${{ github.event_name != 'pull_request' }}
        id: deploy
        # renovate: datasource=git-refs depName=actions/cloudflare-wrangler-action packageName=https://forgejo.alexma.top/actions/cloudflare-wrangler-action currentValue=v4.0.0
        uses: https://forgejo.alexma.top/actions/cloudflare-wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy ./site/public --project-name=${{ vars.WEBSITE_CLOUDFLARE_PAGES_PROJECT }} --branch=main
