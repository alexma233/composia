name: Website CI

on:
  pull_request:
    paths:
      - "site/**"
      - "scripts/docs/**"
      - "proto/**"
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "scripts/docs/**"
      - "proto/**"
      - ".forgejo/workflows/docs-ci.yaml"
  workflow_dispatch:

env:
  HUGO_ENVIRONMENT: production
  HUGO_ENV: production

jobs:
  build-deploy:
    runs-on: docker-amd64
    container:
      image: forgejo.alexma.top/alexma233/ci-images-hugo-wrangler:latest

    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v6.0.2
        uses: https://forgejo.alexma.top/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download Hugo modules
        run: |
          hugo mod tidy
          hugo mod verify

      - name: Build website
        run: |
          hugo --minify -d public

      - name: Deploy to Cloudflare Pages
        if: ${{ github.event_name != 'pull_request' }}
        id: deploy
        # renovate: datasource=git-refs depName=actions/cloudflare-wrangler-action packageName=https://forgejo.alexma.top/actions/cloudflare-wrangler-action currentValue=v4.0.0
        uses: https://forgejo.alexma.top/actions/cloudflare-wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Cloudflare uses the branch name to decide if a deploy is production or preview.
          # Use the project's production branch (main) so the deployment is marked as Production.
          command: pages deploy ./public --project-name=${{ vars.WEBSITE_CLOUDFLARE_PAGES_PROJECT }} --branch=main
