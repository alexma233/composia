name: Reusable Docker Publish

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      target:
        required: true
        type: string
      platforms:
        required: true
        type: string
      images:
        required: true
        type: string
      tags:
        required: true
        type: string
      labels:
        required: true
        type: string
      cache_ref:
        required: true
        type: string
      latest:
        default: false
        required: false
        type: boolean
      login_dockerhub:
        default: false
        required: false
        type: boolean

env:
  REGISTRY_HOST: forgejo.alexma.top

jobs:
  publish:
    runs-on: docker-amd64-dind
    steps:
      - name: Checkout
        # renovate: datasource=git-refs depName=actions/checkout packageName=https://forgejo.alexma.top/actions/checkout currentValue=v7.0.0
        uses: https://forgejo.alexma.top/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        id: buildx
        # renovate: datasource=git-refs depName=actions/docker-setup-buildx-action packageName=https://forgejo.alexma.top/actions/docker-setup-buildx-action currentValue=v4.2.0
        uses: https://forgejo.alexma.top/actions/docker-setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to Forgejo Registry
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.4.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.OCI_IMAGES_FORGEJO_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_FORGEJO_TOKEN }}

      - name: Login to GHCR
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.4.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ secrets.OCI_IMAGES_GHCR_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_GHCR_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.login_dockerhub }}
        # renovate: datasource=git-refs depName=actions/docker-login-action packageName=https://forgejo.alexma.top/actions/docker-login-action currentValue=v4.4.0
        uses: https://forgejo.alexma.top/actions/docker-login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          username: ${{ secrets.OCI_IMAGES_DOCKERHUB_USERNAME }}
          password: ${{ secrets.OCI_IMAGES_DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        # renovate: datasource=git-refs depName=actions/docker-metadata-action packageName=https://forgejo.alexma.top/actions/docker-metadata-action currentValue=v6.2.0
        uses: https://forgejo.alexma.top/actions/docker-metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ${{ inputs.images }}
          flavor: |
            latest=${{ inputs.latest }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Build and push
        # renovate: datasource=git-refs depName=actions/docker-build-push-action packageName=https://forgejo.alexma.top/actions/docker-build-push-action currentValue=v7.3.0
        uses: https://forgejo.alexma.top/actions/docker-build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          push: true
          platforms: ${{ inputs.platforms }}
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ inputs.cache_ref }}
          cache-to: |
            type=registry,ref=${{ inputs.cache_ref }},mode=max
